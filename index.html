<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dota 2 Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Unique Modern Palette - Purple/Cyan theme */
  --bg-primary:#0a0e27;
  --bg-secondary:#141b3a;
  --bg-card:#1a2347;
  --bg-card-hover:#212d5a;
  --border:#2d3a6e;
  --accent-primary:#8b5cf6;
  --accent-secondary:#06b6d4;
  --accent-gradient:linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
  --text-primary:#f0f4ff;
  --text-secondary:#a5b4fc;
  --text-muted:#6b7bb8;
  --success:#10b981;
  --warning:#f59e0b;
  --error:#ef4444;
  --gold:#fbbf24;
  --nav-h:60px;
  --r:16px;--r2:12px;--r3:8px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --glow:0 0 20px rgba(139,92,246,.3);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overscroll-behavior:none}
body{
  background:var(--bg-primary);
  background-image:
    radial-gradient(circle at 20% 50%, rgba(139,92,246,.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.1) 0%, transparent 50%);
  color:var(--text-primary);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  overflow-x:hidden;
  padding-bottom:var(--nav-h);
}

/* ── WELCOME SCREEN ── */
.welcome-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--bg-primary);
  background-image:
    radial-gradient(circle at 20% 50%, rgba(139,92,246,.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.15) 0%, transparent 50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;opacity:1;transition:opacity .5s ease;
}
.welcome-screen.hide{opacity:0;pointer-events:none}
.welcome-logo{
  width:280px;height:280px;
  border-radius:50%;
  box-shadow:0 0 60px rgba(139,92,246,.4), 0 0 120px rgba(6,182,212,.2);
  animation:float 3s ease-in-out infinite;
  margin-bottom:32px;
}
.welcome-title{
  font-size:32px;font-weight:700;
  background:var(--accent-gradient);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
  animation:fadeIn 1s ease;
}
.welcome-subtitle{
  font-size:16px;color:var(--text-secondary);
  margin-bottom:40px;
  animation:fadeIn 1.5s ease;
}
.welcome-btn{
  padding:14px 40px;
  background:var(--accent-gradient);
  border:none;border-radius:30px;
  color:white;font-size:16px;font-weight:600;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(139,92,246,.3);
  transition:all .3s ease;
  animation:fadeIn 2s ease;
}
.welcome-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(139,92,246,.4);
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── SCREENS ── */
.screen{display:none}
.screen.active{display:block}
.wrap{max-width:600px;margin:0 auto;padding:12px 12px 16px}

/* ── NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--nav-h);
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  box-shadow:0 -4px 24px rgba(0,0,0,.4);
  display:flex;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;
  border:none;background:none;padding:0;
  color:var(--text-muted);transition:all .3s ease;
  position:relative;
}
.nav-btn::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:3px;background:var(--accent-gradient);
  border-radius:0 0 3px 3px;transition:width .3s ease;
}
.nav-btn.active{color:var(--accent-primary)}
.nav-btn.active::before{width:60%}
.nav-btn:hover{color:var(--accent-secondary)}
.nav-btn svg{width:24px;height:24px;stroke-width:2}
.nav-btn span{font-size:11px;font-weight:600;letter-spacing:.3px}

/* ── HEADER ── */
.page-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 12px;margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.page-title{font-size:17px;font-weight:700;color:var(--text-primary)}
.page-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;color:#10b981;
  background:rgba(76,217,100,.1);
  border:1px solid rgba(76,217,100,.2);
  border-radius:20px;padding:3px 9px;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── SEARCH ── */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-field{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:0 12px;
  transition:border-color .15s;
}
.search-field:focus-within{border-color:var(--accent-primary)}
.search-field svg{width:16px;height:16px;stroke:var(--text-muted);flex-shrink:0}
.search-field input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text-primary);font-size:14px;font-family:'Inter',sans-serif;
  padding:11px 0;
}
.search-field input::placeholder{color:var(--text-muted)}
.btn-primary{
  background:var(--accent-gradient);
  color:#fff;
  border:none;border-radius:var(--r2);
  padding:0 20px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  transition:all .3s ease;
  flex-shrink:0;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 100%);
  opacity:0;transition:opacity .3s ease;
}
.btn-primary:hover{
  box-shadow:var(--shadow-md), var(--glow);
  transform:translateY(-2px);
}
.btn-primary:hover::before{opacity:1}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* suggest */
.suggest-wrap{position:relative}
.suggest-drop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;
  background:var(--bg-secondary);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;
}
.suggest-drop.open{display:block}
.sug-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;cursor:pointer;
  transition:background .12s;border-bottom:1px solid var(--border);
}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:rgba(255,255,255,.04)}
.sug-av{width:30px;height:30px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0}
.sug-name{font-size:13px;font-weight:500;color:var(--text-primary)}
.sug-id{font-size:11px;color:var(--text-muted);margin-top:1px}

/* picker */
.picker-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.picker-head{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.picker-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.picker-row:last-child{border-bottom:none}
.picker-row:hover{background:rgba(255,255,255,.04)}
.picker-av{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--border);flex-shrink:0}
.picker-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.picker-id{font-size:11px;color:var(--text-muted);margin-top:1px}

/* error */
.err-bar{
  display:none;align-items:center;gap:8px;
  background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.25);
  border-radius:var(--r2);padding:10px 13px;margin-bottom:10px;
  font-size:12px;color:#ff6b61;
}
.err-bar.show{display:flex}

/* skeleton */
.skel{display:none;margin-bottom:12px}
.skel.show{display:block}
.sk{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-secondary) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:sk 1.3s infinite;border-radius:var(--r2)}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-row{display:flex;gap:12px;background:var(--bg-card);border-radius:var(--r);padding:14px;margin-bottom:8px}
.sk-av{width:48px;height:48px;flex-shrink:0;border-radius:10px}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:7px;padding-top:2px}
.sk-line{height:10px;border-radius:3px}
.sk-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sk-box{height:64px;border-radius:var(--r)}

/* ── PROFILE CARD ── */
.profile-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:var(--shadow-md);
  transition:all .3s ease;
}
.profile-card:hover{
  box-shadow:var(--shadow-lg), var(--glow);
  transform:translateY(-2px);
}
.profile-cover{
  height:80px;
  background:var(--accent-gradient);
  position:relative;
  overflow:hidden;
}
.profile-cover::before{
  content:'';position:absolute;inset:0;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,0 Q300,60 600,30 T1200,0 L1200,120 L0,120 Z" fill="rgba(0,0,0,.2)"/></svg>') no-repeat bottom;
  background-size:cover;
}
.profile-cover::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent-primary),var(--accent-secondary),var(--accent-primary));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.profile-body{padding:0 14px 14px;display:flex;gap:12px;align-items:flex-end;margin-top:-22px}
.profile-av{
  width:48px;height:48px;border-radius:10px;
  border:2px solid var(--bg-primary);object-fit:cover;
  background:var(--border);flex-shrink:0;position:relative;z-index:1;
}
.profile-info{flex:1;min-width:0;padding-top:24px}
.profile-name{font-size:17px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{
  font-size:10px;font-weight:600;letter-spacing:.3px;
  padding:2px 7px;border-radius:20px;
}
.tag-blue{background:rgba(36,129,204,.2);color:var(--accent-secondary);border:1px solid rgba(36,129,204,.3)}
.tag-green{background:rgba(76,217,100,.15);color:#10b981;border:1px solid rgba(76,217,100,.25)}
.tag-muted{background:rgba(255,255,255,.06);color:var(--text-secondary);border:1px solid var(--border)}
.profile-right{flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding-top:24px;align-items:flex-end}
.rank-box{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:var(--r2);padding:5px 10px;text-align:center;min-width:68px;
}
.rank-em{font-size:18px;line-height:1}
.rank-name{font-size:10px;font-weight:600;color:var(--text-secondary);margin-top:2px;white-space:nowrap}
.mmr-box{
  background:rgba(255,214,10,.08);border:1px solid rgba(255,214,10,.2);
  border-radius:var(--r2);padding:3px 10px;text-align:center;min-width:68px;
}
.mmr-val{font-size:13px;font-weight:700;color:#fbbf24}
.mmr-lbl{font-size:9px;color:var(--text-muted);margin-top:1px}

/* ── TABS (inner) ── */
.tab-bar{
  display:flex;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--r);
  padding:3px;gap:2px;margin-bottom:12px;
}
.tab-btn{
  flex:1;padding:7px 4px;text-align:center;
  font-size:12px;font-weight:600;color:var(--text-muted);
  border:none;background:none;border-radius:var(--r2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tab-btn.active{background:var(--accent-primary);color:#fff}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── SECTION LABEL ── */
.section-lbl{
  font-size:11px;font-weight:600;color:var(--text-muted);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── WR CARD ── */
.wr-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
}
.wr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.wr-big{font-size:48px;font-weight:700;line-height:1;letter-spacing:-1px}
.wr-big.good{color:#10b981}.wr-big.ok{color:#fbbf24}.wr-big.bad{color:#ef4444}
.wr-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.wr-wl{text-align:right}
.wr-w{font-size:16px;font-weight:700;color:#10b981}
.wr-l{font-size:16px;font-weight:700;color:#ef4444}
.wr-total{font-size:11px;color:var(--text-muted);margin-top:2px}
.wr-dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.dot{
  width:20px;height:20px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;
}
.dot.w{background:rgba(76,217,100,.15);color:#10b981;border:1px solid rgba(76,217,100,.25)}
.dot.l{background:rgba(255,59,48,.1);color:#ef4444;border:1px solid rgba(255,59,48,.2)}
.wr-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.wr-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.wr-bar-fill.good{background:#10b981}.wr-bar-fill.ok{background:#fbbf24}.wr-bar-fill.bad{background:#ef4444}

/* streak */
.streak{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:700;margin-bottom:10px;
}
.streak.win{background:rgba(76,217,100,.1);border:1px solid rgba(76,217,100,.2);color:#10b981}
.streak.loss{background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.2);color:#ef4444}

/* trends */
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.trend-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.trend-head{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.trend-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.trend-row:last-child{margin-bottom:0}
.trend-key{font-size:12px;color:var(--text-secondary)}
.trend-val{font-size:14px;font-weight:700;color:var(--text-primary)}
.trend-val.good{color:#10b981}.trend-val.ok{color:#fbbf24}.trend-val.bad{color:#ef4444}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-box{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 6px;text-align:center;
}
.stat-num{font-size:22px;font-weight:700;line-height:1;color:var(--text-primary)}
.stat-num.g{color:#10b981}.stat-num.r{color:#ef4444}.stat-num.au{color:#fbbf24}
.stat-num.b{color:#5ac8fa}.stat-num.p{color:var(--purple)}
.stat-lbl{font-size:9px;font-weight:600;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* chart */
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:10px}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.chart-leg{display:flex;gap:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
.leg-dot{width:8px;height:3px;border-radius:2px}
.chart-wrap{height:120px;position:relative}

/* heroes */
.hero-list{display:flex;flex-direction:column;gap:6px}
.hero-row{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:8px 12px;
  display:flex;align-items:center;gap:10px;
  transition:background .12s;
}
.hero-row:active{background:var(--bg-secondary)}
.hero-n{font-size:10px;font-weight:600;color:var(--text-muted);width:14px;text-align:center;flex-shrink:0}
.hero-img{width:54px;height:30px;border-radius:5px;object-fit:cover;background:var(--border);flex-shrink:0}
.hero-name{flex:1;font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hero-games{font-size:10px;color:var(--text-muted)}
.hero-kda{font-size:10px;color:var(--text-secondary)}
.hero-bar-wrap{width:36px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;flex-shrink:0}
.hero-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.hero-wr{font-size:15px;font-weight:700;min-width:38px;text-align:right}
.hero-wr.good{color:#10b981}.hero-wr.ok{color:#fbbf24}.hero-wr.bad{color:#ef4444}

/* matches */
.match-list{display:flex;flex-direction:column;gap:5px}
.match-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
}
.match-main{
  padding:9px 12px;display:grid;
  grid-template-columns:42px 1fr auto auto;
  align-items:center;gap:9px;position:relative;
}
.match-main::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.match-card.win .match-main::before{background:#10b981}
.match-card.loss .match-main::before{background:#ef4444}
.match-himg{width:42px;height:24px;border-radius:4px;object-fit:cover;background:var(--border);display:block;flex-shrink:0}
.match-kda{font-size:11px;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.match-hero{font-size:10px;color:var(--text-muted);margin-top:2px}
.match-dur{font-size:9px;color:var(--text-muted);margin-top:1px}
.match-kda-big{font-size:18px;font-weight:700;text-align:center}
.match-kda-big.good{color:#10b981}.match-kda-big.ok{color:#fbbf24}.match-kda-big.bad{color:#ef4444}
.match-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.3px}
.match-pill.win{background:rgba(76,217,100,.12);color:#10b981;border:1px solid rgba(76,217,100,.2)}
.match-pill.loss{background:rgba(255,59,48,.1);color:#ef4444;border:1px solid rgba(255,59,48,.18)}
.match-chevron{font-size:10px;color:var(--text-muted);transition:transform .2s;line-height:1}
.match-card.open .match-chevron{transform:rotate(180deg)}
.match-expand{display:none;border-top:1px solid var(--border);padding:10px 12px;background:rgba(0,0,0,.2)}
.match-card.open .match-expand{display:block}
.mex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.mex-cell{text-align:center}
.mex-val{font-size:14px;font-weight:700;color:var(--text-primary)}

.mission-card{
  background:var(--bg-card);

  content:'';position:absolute;top:0;left:0;right:0;height:4px;

  transition:transform .6s cubic-bezier(0.4, 0.0, 0.2, 1);
}
.mission-card:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-md), var(--glow);
  border-color:var(--accent-primary);
}
.mission-card.done{
  border-color:var(--success);
  background:linear-gradient(135deg,var(--bg-card) 0%,rgba(16,185,129,.08) 100%);
}
.mission-card.done::before{
  background:linear-gradient(90deg,var(--success),#34d399);
  transform:scaleX(1);
}
.mission-card.done:hover{
  box-shadow:var(--shadow-md), 0 0 20px rgba(16,185,129,.3);
}
.mission-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.mission-desc{font-size:11px;color:var(--text-muted);margin-top:2px}

.mission-coins{font-size:13px;font-weight:700;color:#fbbf24}
.mission-xp{font-size:10px;color:var(--text-muted);margin-top:1px}
.mission-bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-bottom:6px;position:relative}
.mission-bar-bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.mission-bar-fill{
  height:100%;border-radius:3px;
  transition:width .8s cubic-bezier(0.4, 0.0, 0.2, 1);

  position:relative;
  box-shadow:0 0 10px rgba(139,92,246,.5);
}

  content:'';position:absolute;top:0;left:0;right:0;bottom:0;

}

.claim-btn:hover{

}

const kc=(k)=>k>=4?'good':k>=2?'ok':'bad';

function getRank(t,s){
  if(t){const r=String(t),tier=parseInt(r[0])||0,stars=r.length>1?parseInt(r[1])||0:0,rk=RM[tier]||{e:"❓",n:"Unknown"};return{e:rk.e,n:rk.n,stars};}
  if(!s||s==='Uncalibrated')return{e:"❓",n:"Uncalibrated",stars:0};
  const nl=s.toLowerCase();let tier=0;
  if(nl.includes('herald'))tier=1;else if(nl.includes('guardian'))tier=2;else if(nl.includes('crusader'))tier=3;else if(nl.includes('archon'))tier=4;else if(nl.includes('legend'))tier=5;else if(nl.includes('ancient'))tier=6;else if(nl.includes('divine'))tier=7;else if(nl.includes('immortal'))tier=8;
  const stars=(s.match(/★/g)||[]).length,rk=RM[tier]||{e:"❓",n:"Unknown"};
  return{e:rk.e,n:rk.n,stars};
}
function stars(n){return n?`<span style="font-size:9px;color:#fbbf24"> ${'★'.repeat(Math.min(n,5))}</span>`:''}
function hImg(id,sh){const s=sh||HS[id];return s?`https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${s}.png`:id?`https://api.opendota.com/apps/dota2/images/heroes/${id}_sb.png`:'';}
function hFb(id){return id?`https://api.opendota.com/apps/dota2/images/heroes/${id}_sb.png`:'';}
function hName(id,ns){if(ns&&ns!=='Unknown'&&!ns.startsWith('Hero #'))return ns;return HN[id]||(id?`Hero #${id}`:'Unknown');}
function getTid(){
  // Для тестирования в браузере - берем из localStorage
  const testId = localStorage.getItem('test_telegram_id');
  if(testId) return parseInt(testId);

  // В Telegram Web App
  return tg?.initDataUnsafe?.user?.id||null;
}

// ── SEARCH ───────────────────────────────────────
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
let sugT=null;
document.getElementById('si').addEventListener('input',e=>{
  const v=e.target.value.trim();
  clearTimeout(sugT);
  if(v.length<2||/^\d+$/.test(v)){closeSug();return;}
  sugT=setTimeout(()=>fetchSug(v),350);
});
document.addEventListener('click',e=>{if(!e.target.closest('.suggest-wrap'))closeSug();});

async function fetchSug(q){
  try{const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);renderSug(await r.json());}
  catch{closeSug();}
}
function renderSug(list){
  const el=document.getElementById('sugDrop');
  if(!list?.length){closeSug();return;}
  el.innerHTML=list.map(p=>`
    <div class="sug-item" onclick="pickSug('${p.account_id}')">
      <img class="sug-av" src="${h(p.avatarfull||'')}" onerror="this.style.visibility='hidden'" alt="">
      <div><div class="sug-name">${h(p.personaname||'Unknown')}</div><div class="sug-id">ID: ${p.account_id}</div></div>
    </div>`).join('');
  el.classList.add('open');
}
function pickSug(id){document.getElementById('si').value=id;closeSug();doSearch();}
function closeSug(){document.getElementById('sugDrop').classList.remove('open');}

async function doSearch(){
  const q=document.getElementById('si').value.trim();
  if(!q)return;
  closeSug();clearPicker();setLoad(true);hideErr();clearResults();
  try{
    if(/^\d+$/.test(q)){await loadPlayer(q);return;}
    const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const list=await r.json();
    if(!list?.length){showErr(`Игрок «${q}» не найден`);return;}
    if(list.length===1){await loadPlayer(String(list[0].account_id));}
    else{setLoad(false);showPicker(list);}
  }catch(e){showErr(e.message||'Ошибка поиска');}
  finally{setLoad(false);}
}

function showPicker(list){
  document.getElementById('pickerBlock').innerHTML=`
    <div class="picker-card fu">
      <div class="picker-head">Найдено ${list.length} игроков — выбери нужного</div>
      ${list.map(p=>`
        <div class="picker-row" onclick="pickPl('${p.account_id}')">
          <img class="picker-av" src="${h(p.avatarfull||'')}" onerror="this.style.opacity='.3'" alt="">
          <div><div class="picker-name">${h(p.personaname||'Unknown')}</div><div class="picker-id">ID: ${p.account_id}</div></div>
        </div>`).join('')}
    </div>`;
}
async function pickPl(id){clearPicker();document.getElementById('si').value=id;await loadPlayer(id);}
function clearPicker(){document.getElementById('pickerBlock').innerHTML='';}

async function loadPlayer(query){
  setLoad(true);hideErr();clearResults();
  try{
    const r=await fetch(`${API}/player?query=${encodeURIComponent(query)}`);
    if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.detail||`Ошибка ${r.status}`);}
    playerData=await r.json();
    renderAll(playerData);
    const tid=getTid();
    if(tid) loadUserData(tid);
  }catch(e){showErr(e.message||'Не удалось загрузить данные');}
  finally{setLoad(false);}
}

function setLoad(on){
  document.getElementById('skel').classList.toggle('show',on);
  const b=document.getElementById('sb');b.disabled=on;b.textContent=on?'...':'Найти';
}
function showErr(m){const el=document.getElementById('errBar');document.getElementById('errMsg').textContent=m;el.classList.add('show');}

function clearResults(){document.getElementById('results').innerHTML='';}

// ── CHART ────────────────────────────────────────
function drawChart(ms){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('kdaChart')?.getContext('2d');
  if(!ctx)return;
  const rev=[...ms.slice(0,15)].reverse();
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:rev.map((_,i)=>`#${i+1}`),
      datasets:[{
        data:rev.map(m=>m.kda||0),
        backgroundColor:rev.map(m=>m.win?'rgba(76,217,100,.5)':'rgba(255,59,48,.45)'),
        borderColor:rev.map(m=>m.win?'#4cd964':'#ff3b30'),
        borderWidth:1,borderRadius:4,borderSkipped:false,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:500},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#242f3d',borderColor:'#2f3f50',borderWidth:1,titleColor:'#7d9ab5',bodyColor:'#e8f4fd',padding:8,callbacks:{title:c=>`Матч ${c[0].label}`,label:c=>` KDA: ${c.raw}`}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#4a6278',font:{family:'Inter',size:8}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#4a6278',font:{family:'Inter',size:8}},beginAtZero:true}
      }
    }
  });
}

function buildCtx(){
  if(!playerData)return"No player data.";
  const d=playerData,p=d.profile,s=d.stats,t=d.trend||{};
  const heroes=(d.top_heroes||[]).slice(0,5).map(h=>`${h.hero_name||h.hero_id}(${h.matches}г,WR${h.winrate}%,KDA${h.kda})`).join(', ');
  const matches=(d.recent_matches||[]).slice(0,8).map(m=>`${m.win?'П':'П'} ${m.hero||'?'} ${m.kills}/${m.deaths}/${m.assists} KDA${m.kda}`).join('\n');
  return `Игрок: ${p.name} | Ранг: ${p.rank}\nWR: ${s.winrate}% (${s.wins}П/${s.losses}П)\nLast5: WR${t.last5_winrate??'?'}% KDA${t.last5_avg_kda??'?'} GPM${t.last5_avg_gpm??'?'}\nStreak: ${t.streak?.count||0} ${t.streak?.type||'-'}\nГерои: ${heroes}\nМатчи:\n${matches}`.trim();
}
const AI_P={
  analysis:"Сделай детальный разбор игры этого игрока. Что хорошо и плохо? Ключевые проблемы?",
  forecast:"На основе трендов — будет ли этот игрок расти в MMR? Что изменить?",
  heroes:"Посмотри на пул героев. Каких стоит освоить следующими и почему?",
  weak:"Найди конкретные слабые места. Где именно теряются игры?"
};
async function callAI(msg){
  const ctx=buildCtx();
  const msgs=aiHistory.length===0?[{role:"user",content:`Данные игрока:\n${ctx}\n\n---\n${msg}`}]:[...aiHistory.slice(-6),{role:"user",content:msg}];
  const r=await fetch(`${API}/ai`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,player_context:ctx,history:aiHistory.slice(-6)})});
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.detail||`Ошибка ${r.status}`);}
  const d=await r.json(),text=d.reply||'Нет ответа';
  aiHistory.push({role:'user',content:msg},{role:'assistant',content:text});
  return text;
}
function setAILoad(on){
  document.getElementById('aiTyping').classList.toggle('on',on);
  const b=document.getElementById('aiBtn');if(b)b.disabled=on;
}
function addMsg(role,text){
  const el=document.getElementById('aiMsgs');if(!el)return;
  const d=document.createElement('div');d.className=`ai-msg ${role}`;
  d.innerHTML=`<div class="ai-avatar">${role==='bot'?'🤖':'👤'}</div><div class="ai-bubble">${h(text).replace(/\n/g,'<br>')}</div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
async function aiSend(){
  const inp=document.getElementById('aiIn');
  const msg=inp?.value.trim();if(!msg)return;
  if(!playerData){addMsg('bot','⚠️ Сначала найди игрока');return;}
  inp.value='';addMsg('user',msg);setAILoad(true);
  try{addMsg('bot',await callAI(msg));}
  catch(e){addMsg('bot',`❌ Ошибка: ${e.message}`);}
  finally{setAILoad(false);}
}
async function aiQ(type){
  if(!playerData){alert('Сначала найди игрока!');return;}
  swTab('ai',document.querySelectorAll('.tab-btn')[3]);
  const p=AI_P[type];addMsg('user',p);setAILoad(true);
  try{addMsg('bot',await callAI(p));}
  catch(e){addMsg('bot',`❌ Ошибка: ${e.message}`);}
  finally{setAILoad(false);}
}

// ── USER DATA ─────────────────────────────────────
async function loadUserData(tid){
  try{
    const r=await fetch(`${API}/user/profile?telegram_id=${tid}`);
    if(!r.ok)return;
    const d=await r.json();
    currentUser=d.user;
    updateBalance(currentUser.coins||0);
  }catch{}
}
function updateBalance(coins){
  document.getElementById('mCoins').textContent=`💰 ${coins}`;
  document.getElementById('sCoins').textContent=`💰 ${coins}`;
}

// ── MISSIONS ──────────────────────────────────────
async function loadMissions(){
  const el=document.getElementById('mList');
  const tid=getTid();
  if(!tid&&!playerData){
    el.innerHTML='<div class="empty"><span class="empty-icon">🔍</span><div class="empty-text">Сначала найди игрока<br>на вкладке Поиск</div></div>';
    return;
  }
  el.innerHTML='<div class="empty"><span class="empty-icon" style="font-size:28px">⏳</span><div class="empty-text">Загрузка...</div></div>';
  try{
    if(tid){
      const r=await fetch(`${API}/missions?telegram_id=${tid}`);
      if(r.ok){const d=await r.json();renderMissions(d.missions||[]);return;}
    }
    if(playerData) renderLocalMissions(playerData);
    else el.innerHTML='<div class="empty"><span class="empty-icon">⚠️</span><div class="empty-text">Не удалось загрузить</div></div>';
  }catch{
    if(playerData) renderLocalMissions(playerData);
  }
}

function renderLocalMissions(data){
  const s=data.stats,t=data.trend||{},rm=data.recent_matches||[];
  const ms=[
    {icon:'🏆',title:'Серия побед',desc:'Выиграй 3 матча подряд',progress:Math.min(t.streak?.type==='win'?t.streak.count:0,3),target:3,coins:50,xp:100,type:'daily',done:t.streak?.type==='win'&&t.streak.count>=3},
    {icon:'⚔️',title:'Высокий KDA',desc:'Набери KDA 4+ в матче',progress:rm.filter(m=>m.kda>=4).length,target:1,coins:30,xp:60,type:'daily',done:rm.some(m=>m.kda>=4)},
    {icon:'💰',title:'Фарм-мастер',desc:'Среднее GPM 600+',progress:Math.round(t.last5_avg_gpm||0),target:600,coins:80,xp:150,type:'weekly',done:(t.last5_avg_gpm||0)>=600},
    {icon:'📈',title:'Стабильность',desc:'WR выше 50% за последние 20',progress:Math.round(s.winrate),target:50,coins:100,xp:200,type:'weekly',done:s.winrate>=50},
    {icon:'🌟',title:'Мастер',desc:'Выиграй 50 матчей',progress:Math.min(s.wins,50),target:50,coins:200,xp:500,type:'monthly',done:s.wins>=50},
  ];
  renderMissions(ms);
}

function renderMissions(ms){
  const el=document.getElementById('mList');
  if(!ms?.length){el.innerHTML='<div class="empty"><span class="empty-icon">📭</span><div class="empty-text">Нет активных миссий</div></div>';return;}
  const groups={daily:[],weekly:[],monthly:[]};
  ms.forEach(m=>{const t=m.type||'daily';(groups[t]=groups[t]||[]).push(m);});
  const labels={daily:'Ежедневные',weekly:'Недельные',monthly:'Месячные'};
  let html='';
  ['daily','weekly','monthly'].forEach(type=>{
    if(!groups[type]?.length)return;
    html+=`<div class="type-badge">${labels[type]}</div>`;
    groups[type].forEach(m=>{
      const tv=m.target_value||m.target||1;
      const pct=Math.min(Math.round((m.progress||0)/tv*100),100);
      const done=m.completed||m.done||pct>=100;
      const canClaim=done&&!m.claimed;
      html+=`
      <div class="mission-card ${done?'done':''}">
        <div class="mission-top">
          <div class="mission-icon">${m.icon||'🎯'}</div>
          <div style="flex:1;min-width:0">
            <div class="mission-title">${h(m.title)}</div>
            <div class="mission-desc">${h(m.description||m.desc||'')}</div>
          </div>
          <div class="mission-reward">
            <div class="mission-coins">+${m.reward_coins||m.coins||0}💰</div>
            <div class="mission-xp">+${m.reward_xp||m.xp||0} XP</div>
          </div>
        </div>
        <div class="mission-bar-bg"><div class="mission-bar-fill" style="width:${pct}%;background:${done?'#10b981':'var(--accent-primary)'}"></div></div>
        <div class="mission-progress"><span>${m.progress||0} / ${tv}</span><span>${pct}%</span></div>
        ${canClaim?`<button class="claim-btn" onclick="claimM(${m.id||0})">✅ Получить награду</button>`:''}
      </div>`;
    });
  });
  el.innerHTML=html;
}

async function claimM(id){
  const tid=getTid();
  if(!tid){
    alert('❌ Установите Telegram ID в тест режиме или откройте через Telegram');
    return;
  }
  try{
    const r=await fetch(`${API}/missions/claim`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tid,mission_id:id})});
    const d=await r.json();
    if(r.ok && d.status==='ok'){
      alert(`🎉 Награда получена!\n\n💰 +${d.reward?.coins||0} монет\n⭐ +${d.reward?.xp||0} XP`);
      loadUserData(tid);
      loadMissions();
    }else{
      alert('❌ Ошибка: '+(d.detail||'Не удалось получить награду'));
    }
  }catch(e){
    console.error('Claim error:',e);
    alert('❌ Ошибка сети: '+e.message);
  }
}

// ── SHOP ─────────────────────────────────────────
async function loadShop(){
  const el=document.getElementById('sItems');
  el.innerHTML='<div class="empty"><span class="empty-icon" style="font-size:28px">⏳</span><div class="empty-text">Загрузка...</div></div>';
  try{
    const r=await fetch(`${API}/shop`);
    if(!r.ok)throw new Error();
    const d=await r.json();
    const tid=getTid();if(tid)loadUserData(tid);
    renderShop(d.items||[]);
  }catch{
    el.innerHTML='<div class="empty"><span class="empty-icon">⚠️</span><div class="empty-text">Не удалось загрузить магазин</div></div>';
  }
}

function renderShop(items){
  const el=document.getElementById('sItems');
  if(!items?.length){el.innerHTML='<div class="empty"><span class="empty-icon">📦</span><div class="empty-text">Магазин пуст</div></div>';return;}
  const coins=currentUser?.coins||0;
  const labels={booster_xp:'XP Бустеры',booster_coins:'Монетные бустеры',booster_mega:'Мега бустеры',cosmetic_frame:'Рамки',cosmetic_title:'Титулы',special_mission:'Специальное',special_refresh:'Специальное',special_ai:'Специальное'};
  const groups={};
  items.forEach(i=>{(groups[i.type]=groups[i.type]||[]).push(i);});
  let html='';
  Object.keys(groups).forEach(type=>{
    html+=`<div class="type-badge">${labels[type]||type}</div>`;
    groups[type].forEach(item=>{
      const can=coins>=item.price;
      html+=`
      <div class="shop-item">
        <div class="shop-top">
          <div class="shop-icon">${item.icon||'📦'}</div>
          <div style="flex:1;min-width:0">
            <div class="shop-name">${h(item.name)}</div>
            <div class="shop-desc">${h(item.description||'')}</div>
          </div>
          <div class="shop-price">${item.price}💰</div>
        </div>
        <button class="buy-btn" onclick="buyItem(${item.id},'${h(item.name)}',${item.price})" ${!can?'disabled':''}>
          ${can?'Купить':'Недостаточно монет'}
        </button>
      </div>`;
    });
  });
  el.innerHTML=html;
}

async function buyItem(id,name,price){
  const tid=getTid();
  if(!tid){tg?.showAlert?.('Авторизуйся через Telegram для покупок');return;}
  const ok=await (tg?.showConfirm?.(`Купить ${name} за ${price}💰?`) ?? Promise.resolve(confirm(`Купить ${name} за ${price}💰?`)));
  if(!ok)return;
  try{
    const r=await fetch(`${API}/shop/buy`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tid,item_id:id})});
    const d=await r.json();
    if(d.status==='ok'||d.item_name){
      tg?.showAlert?.(`✅ Куплено!\nОсталось: ${d.coins_left}💰`) || alert(`✅ Куплено! Осталось: ${d.coins_left}💰`);
      loadUserData(tid);loadShop();
    }else throw new Error(d.detail||'Ошибка');
  }catch(e){tg?.showAlert?.(e.message)||alert(e.message);}
}

// ── TEST MODE ────────────────────────────────────
function setTestId(){
  const inp=document.getElementById('testIdInput');
  const id=inp?.value.trim();
  if(!id||!parseInt(id)){
    alert('Введите корректный Telegram ID');
    return;
  }
  localStorage.setItem('test_telegram_id',id);
  alert(`✅ Тестовый ID установлен: ${id}\n\nТеперь можно забирать награды!`);
  loadUserData(parseInt(id));
  loadMissions();
}

  const ws=document.getElementById('welcomeScreen');
  ws.classList.add('hide');
  setTimeout(()=>ws.style.display='none',500);
}

window.addEventListener('DOMContentLoaded',()=>{
  const tid=getTid();

  const params=new URLSearchParams(location.search);
  const pid=params.get('player_id');

  // Автоматически скрыть welcome через 3 секунды
  setTimeout(hideWelcome,3000);
});
