<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota 2 Analyzer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg:#0f1115; --card:#1a1d24; --text:#fff; --sec:#8b8e97; --acc:#6f42c1; --acc-h:#8a5ce6; --ok:#2ecc71; --err:#e74c3c; --brd:#2d313c; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        header { padding:16px; background:var(--card); border-bottom:1px solid var(--brd); text-align:center; position:sticky; top:0; z-index:10; }
        header h1 { font-size:18px; font-weight:600; }
        main { flex:1; overflow-y:auto; padding:16px; padding-bottom:80px; }
        .tab { display:none; animation:fade .3s ease; }
        .tab.active { display:block; }
        @keyframes fade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
        .card { background:var(--card); border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
        .card h3 { font-size:16px; margin-bottom:8px; }
        .stat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--brd); }
        .stat-row:last-child { border:none; }
        .stat-val { font-weight:600; color:var(--acc); }
        .btn { display:block; width:100%; padding:14px; margin:8px 0; background:var(--acc); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:500; cursor:pointer; transition:.2s; }
        .btn:active { transform:scale(.98); background:var(--acc-h); }
        .btn:disabled { background:#444; color:#888; cursor:not-allowed; }
        .btn.small { width:auto; padding:8px 12px; font-size:14px; margin:0; }
        .nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--brd); display:flex; justify-content:space-around; padding:10px 0; z-index:20; }
        .nav-item { display:flex; flex-direction:column; align-items:center; color:var(--sec); font-size:12px; cursor:pointer; }
        .nav-item.active { color:var(--acc); }
        .nav-icon { font-size:22px; margin-bottom:4px; }
        .loader { text-align:center; padding:40px; color:var(--sec); }
        .input { width:100%; padding:14px; background:var(--card); border:1px solid var(--brd); border-radius:10px; color:#fff; margin-bottom:12px; outline:none; }
        .input:focus { border-color:var(--acc); }
        .mission { display:flex; align-items:center; justify-content:space-between; padding:12px; background:#22252e; border-radius:10px; margin-bottom:8px; }
        .mission .prog { height:6px; background:#333; border-radius:3px; margin-top:6px; overflow:hidden; }
        .mission .bar { height:100%; background:var(--acc); transition:width .3s; }
        .mission.completed { border-left:4px solid var(--ok); }
        .mission.claimed { opacity:.6; }
        .shop-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px; }
        .shop-item { background:#22252e; padding:10px; border-radius:10px; text-align:center; }
        .shop-item .icon { font-size:32px; margin-bottom:4px; }
        .shop-item .name { font-size:14px; font-weight:500; margin-bottom:4px; }
        .shop-item .price { color:var(--ok); font-weight:600; margin-bottom:6px; }
        #chat { max-height:200px; overflow-y:auto; margin-bottom:10px; padding:10px; background:#15171d; border-radius:8px; }
        .msg { margin:6px 0; padding:8px 12px; border-radius:8px; max-width:85%; word-wrap:break-word; }
        .msg.bot { background:#2a2d35; margin-right:auto; }
        .msg.user { background:var(--acc); margin-left:auto; }
        .toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:var(--card); padding:12px 16px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.4); z-index:100; animation:pop .3s ease; display:none; }
        @keyframes pop { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
    <header><h1>⚔️ Dota 2 Analyzer</h1></header>
    <div id="toast" class="toast"></div>
    <main>
        <div id="tab-profile" class="tab active">
            <div class="card">
                <input type="text" id="search-input" class="input" placeholder="Никнейм или Steam ID">
                <button class="btn" onclick="fetchProfile()">🔍 Найти игрока</button>
                <div id="profile-data"></div>
            </div>
            <div class="card">
                <h3>🤖 AI Анализ</h3>
                <div id="chat"></div>
                <input type="text" id="ai-input" class="input" placeholder="Вопрос...">
                <button class="btn" onclick="sendAI()">Отправить</button>
            </div>
        </div>
        <div id="tab-missions" class="tab">
            <button class="btn" onclick="syncMissions()">🔄 Синхронизировать прогресс</button>
            <div id="missions-list" class="loader">Загрузка...</div>
        </div>
        <div id="tab-shop" class="tab">
            <div class="card">
                <h3>🛒 Магазин</h3>
                <div id="shop-list" class="loader">Загрузка...</div>
            </div>
        </div>
        <div id="tab-inventory" class="tab">
            <div class="card">
                <h3>🎒 Инвентарь</h3>
                <div id="inv-list" class="loader">Загрузка...</div>
            </div>
        </div>
    </main>
    <div class="nav">
        <div class="nav-item active" data-tab="profile"><span class="nav-icon">🔍</span>Профиль</div>
        <div class="nav-item" data-tab="missions"><span class="nav-icon">🎯</span>Миссии</div>
        <div class="nav-item" data-tab="shop"><span class="nav-icon">🛒</span>Магазин</div>
        <div class="nav-item" data-tab="inventory"><span class="nav-icon">🎒</span>Инвентарь</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const API = window.location.origin;
        let user = null, ctx = "", aid = null;
        const toast = (m, err=false) => { const t=document.getElementById('toast'); t.textContent=m; t.style.color=err?'var(--err)':'var(--ok)'; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); };

        async function auth() {
            try {
                const r = await fetch(`${API}/webapp/auth`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({initData:tg.initData}) });
                if(!r.ok) throw new Error('Auth failed');
                user = await r.json();
                tg.MainButton.setText(`Lvl ${user.user.level} | 💰${user.user.coins}`);
                tg.MainButton.show();
                document.querySelector('[data-tab="profile"]').click();
            } catch { toast('❌ Ошибка авторизации',true); }
        }
        auth();

        document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            const tab = el.dataset.tab;
            document.getElementById(`tab-${tab}`).classList.add('active');
            el.classList.add('active');
            if(tab==='missions') loadMissions();
            if(tab==='shop') loadShop();
            if(tab==='inventory') loadInventory();
        });

        async function fetchProfile() {
            const q = document.getElementById('search-input').value.trim();
            if(!q) return tg.showAlert('Введите ник или ID');
            const el = document.getElementById('profile-data');
            el.innerHTML = '<div class="loader">⏳ Загрузка...</div>';
            try {
                const r = await fetch(`${API}/player?query=${encodeURIComponent(q)}`);
                if(!r.ok) throw new Error((await r.json()).detail||'Ошибка');
                const d = await r.json();
                aid = d.account_id; ctx = JSON.stringify(d.stats);
                el.innerHTML = `
                    <div style="text-align:center;margin-bottom:12px">
                        <img src="${d.profile.avatar||'https://cdn.steamstatic.com/steamcommunity/public/images/avatars/fe/fe83d5.jpg'}" style="width:80px;height:80px;border-radius:50%;border:2px solid var(--acc)">
                        <h2 style="margin:8px 0">${d.profile.name}</h2>
                        <span style="background:#222;padding:4px 10px;border-radius:20px;font-size:14px">${d.profile.rank}</span>
                    </div>
                    <div class="stat-row"><span>Матчи</span><span class="stat-val">${d.stats.total_matches}</span></div>
                    <div class="stat-row"><span>Винрейт</span><span class="stat-val">${d.stats.winrate}%</span></div>
                    <div class="stat-row"><span>П/П</span><span class="stat-val">${d.stats.wins} / ${d.stats.losses}</span></div>
                    <p style="margin-top:12px;font-size:12px;color:var(--sec)">💡 Теперь задавай вопросы AI!</p>
                `;
            } catch(e) { el.innerHTML = `<div class="loader" style="color:var(--err)">❌ ${e.message}</div>`; }
        }

        async function sendAI() {
            const inp = document.getElementById('ai-input'), msg = inp.value.trim();
            if(!msg) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user">${msg}</div>`; inp.value='';
            try {
                const r = await fetch(`${API}/ai`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg, player_context:ctx}) });
                const d = await r.json();
                chat.innerHTML += `<div class="msg bot">${d.reply.replace(/\n/g,'<br>')}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch { toast('Ошибка AI',true); }
        }

        async function loadMissions() {
            if(!user) return;
            const el = document.getElementById('missions-list'); el.innerHTML='<div class="loader">⏳ Загрузка...</div>';
            try {
                const r = await fetch(`${API}/missions/assign`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegram_id:user.user.telegram_id}) });
                const d = await r.json();
                if(!d.missions.length) { el.innerHTML='<div class="loader">Нет активных миссий</div>'; return; }
                el.innerHTML = d.missions.map(m => {
                    const pct = m.target_value ? Math.min(100, (m.progress/m.target_value)*100) : 0;
                    const completed = m.completed; const claimed = m.claimed;
                    return `
                    <div class="mission ${completed?'completed':''} ${claimed?'claimed':''}">
                        <div style="flex:1;min-width:0">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <strong>${m.icon||'🎯'} ${m.title}</strong>
                                ${completed && !claimed ? `<button class="btn small" onclick="claimMission(${m.id})">Забрать</button>` : ''}
                                ${claimed ? '<span style="color:var(--ok)">✅</span>' : ''}
                            </div>
                            <small style="color:#888">${m.description}</small>
                            <div class="prog"><div class="bar" style="width:${pct}%"></div></div>
                            <small style="color:#666">${m.progress || 0} / ${m.target_value}</small>
                        </div>
                    </div>`;
                }).join('');
            } catch { el.innerHTML='<div class="loader">❌ Ошибка</div>'; }
        }

        async function syncMissions() {
            if(!user || !aid) return tg.showAlert('Сначала найди игрока');
            toast('🔄 Синхронизация...');
            try {
                await fetch(`${API}/missions/sync`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegram_id:user.user.telegram_id, account_id:aid}) });
                loadMissions(); toast('✅ Прогресс обновлён');
            } catch { toast('❌ Ошибка синхронизации',true); }
        }

        async function claimMission(id) {
            try {
                const r = await fetch(`${API}/missions/claim`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegram_id:user.user.telegram_id, mission_id:id}) });
                if(!r.ok) throw new Error((await r.json()).detail);
                const d = await r.json();
                toast(`+${d.new_xp} XP | Lvl ${d.new_level}`);
                tg.MainButton.setText(`Lvl ${d.new_level} | 💰${user.user.coins}`);
                loadMissions(); loadProfile();
            } catch(e) { toast(e.message||'Ошибка',true); }
        }

        async function loadShop() {
            if(!user) return;
            const el = document.getElementById('shop-list'); el.innerHTML='<div class="loader">⏳ Загрузка...</div>';
            try {
                const r = await fetch(`${API}/shop/items?telegram_id=${user.user.telegram_id}`);
                const d = await r.json();
                el.innerHTML = `<div class="shop-grid">${d.items.map(i => `
                    <div class="shop-item">
                        <div class="icon">${i.icon}</div>
                        <div class="name">${i.name}</div>
                        <div class="price">💰 ${i.price}</div>
                        <button class="btn small" ${user.user.coins<i.price?'disabled':''} onclick="buyItem(${i.id})">${i.owned>0?`Куплено (${i.owned})`:'Купить'}</button>
                    </div>`).join('')}</div>`;
            } catch { el.innerHTML='<div class="loader">❌ Ошибка</div>'; }
        }

        async function buyItem(id) {
            try {
                const r = await fetch(`${API}/shop/buy`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegram_id:user.user.telegram_id, item_id:id}) });
                if(!r.ok) throw new Error((await r.json()).detail);
                const d = await r.json();
                toast(`✅ Куплено: ${d.item}`);
                user.user.coins = d.new_coins; tg.MainButton.setText(`Lvl ${user.user.level} | 💰${user.user.coins}`);
                loadShop();
            } catch(e) { toast(e.message||'Ошибка',true); }
        }

        async function loadInventory() {
            if(!user) return;
            const el = document.getElementById('inv-list'); el.innerHTML='<div class="loader">⏳ Загрузка...</div>';
            try {
                const r = await fetch(`${API}/user/profile?telegram_id=${user.user.telegram_id}`);
                const d = await r.json();
                if(!d.inventory.length) { el.innerHTML='<div class="loader">🎒 Пусто</div>'; return; }
                el.innerHTML = d.inventory.map(i => `
                    <div class="stat-row">
                        <span>${i.icon} ${i.name}</span>
                        <span class="stat-val">x${i.quantity}</span>
                    </div>`).join('');
            } catch { el.innerHTML='<div class="loader">❌ Ошибка</div>'; }
        }

        function loadProfile() {
            if(!user) return;
            const el = document.getElementById('tab-profile').querySelector('.card');
            el.innerHTML = `
                <input type="text" id="search-input" class="input" placeholder="Никнейм или Steam ID">
                <button class="btn" onclick="fetchProfile()">🔍 Найти игрока</button>
                <div id="profile-data"></div>
                <div style="margin-top:12px;text-align:center">
                    <span style="font-size:20px;font-weight:600">💰 ${user.user.coins}</span> • 
                    <span style="font-size:16px;color:var(--acc)">⭐ Lvl ${user.user.level}</span> • 
                    <span style="font-size:14px;color:var(--sec)">${user.user.xp} / ${(user.user.level*500)} XP</span>
                </div>
                <div class="card"><h3>🤖 AI Анализ</h3><div id="chat"></div><input type="text" id="ai-input" class="input" placeholder="Вопрос..."><button class="btn" onclick="sendAI()">Отправить</button></div>
            `;
        }
        if(tg.themeParams.bg_color) document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
        if(tg.themeParams.secondary_bg_color) document.documentElement.style.setProperty('--card', tg.themeParams.secondary_bg_color);
    </script>
</body>
</html>
