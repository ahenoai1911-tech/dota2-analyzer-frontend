<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Dota 2 Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e17;--bg2:#0d1219;--bg3:#12171f;
  --card:#151b26;--card2:#1a2130;
  --border:#1e2838;--border2:#2a3548;
  --red:#ff4757;--red2:#ff6b7a;
  --gold:#ffd32a;--gold2:#ffe66d;
  --green:#2ed573;--green2:#7bed9f;
  --blue:#5f27cd;--cyan:#00d2d3;--purple:#a29bfe;
  --ai:#6c5ce7;--ai2:#a29bfe;
  --text:#dfe6e9;--text2:#74b9ff;--text3:#636e72;
  --white:#ffffff;--accent:#00d2d3;
  --r:10px;--r2:7px;
  --nav-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:#0a0e17;
  color:var(--text);
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 8px);
}

/* SCREENS */
.screen{display:none;min-height:calc(100vh - var(--nav-h))}
.screen.active{display:block}

.wrap{max-width:640px;margin:0 auto;padding:12px 12px 8px}

/* ── BOTTOM NAV ─────────────────────────────── */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:var(--nav-h);
  background:var(--card);
  border-top:1px solid var(--border2);
  display:flex;
  z-index:1000;
  backdrop-filter:blur(10px);
  box-shadow:0 -4px 20px rgba(0,0,0,.5);
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  cursor:pointer;
  transition:all .2s ease;
  border:none;
  background:none;
  padding:0;
  position:relative;
}
.nav-item::before{
  content:'';
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:0;height:2px;
  background:var(--cyan);
  border-radius:0 0 2px 2px;
  transition:width .2s ease;
}
.nav-item.active::before{width:28px}
.nav-icon{font-size:18px;line-height:1;transition:transform .2s}
.nav-item.active .nav-icon{transform:translateY(-1px)}
.nav-label{
  font-family:'Share Tech Mono',monospace;
  font-size:8px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text3);
  transition:color .2s;
  white-space:nowrap;
}
.nav-item.active .nav-label{color:var(--cyan)}

/* ── HEADER ─────────────────────────────────── */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 0 12px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.hdr-logo{width:36px;height:36px;flex-shrink:0;border:1px solid rgba(0,210,211,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(0,210,211,.06)}
.hdr-em{font-size:18px}
.hdr-title h1{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white)}
.hdr-title p{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:1.5px}
.hdr-live{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan);border:1px solid rgba(0,210,211,.25);border-radius:4px;padding:4px 8px;background:rgba(0,210,211,.06);white-space:nowrap}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SEARCH ─────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:0 12px;display:flex;align-items:center;gap:10px;transition:all .25s}
.search-box:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,210,211,.12)}
.s-icon{color:var(--text3);font-size:15px;flex-shrink:0}
.search-input{flex:1;background:none;border:none;padding:11px 0;color:var(--white);font-size:15px;font-family:'Exo 2',sans-serif;font-weight:500;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-btn{background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:var(--r2);padding:8px 16px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s}
.search-btn:hover{opacity:.88}
.search-btn:active{transform:scale(.97)}
.search-btn:disabled{opacity:.35;cursor:not-allowed}

/* SUGGEST */
.suggest-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;z-index:200;box-shadow:0 10px 32px rgba(0,0,0,.7);display:none}
.suggest-list.open{display:block}
.suggest-item{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;font-size:13px;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:var(--bg3)}
.sug-av{width:28px;height:28px;border-radius:5px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.sug-name{color:var(--white);font-weight:600;font-size:13px}
.sug-id{color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:9px}
.sug-hint{padding:7px 14px;font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;text-align:center}

/* PICKER */
.picker{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.picker-header{padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:1.5px;border-bottom:1px solid var(--border);background:rgba(0,210,211,.05)}
.picker-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s;border-bottom:1px solid var(--border)}
.picker-item:last-child{border-bottom:none}
.picker-item:hover{background:var(--bg3)}
.picker-av{width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.picker-name{color:var(--white);font-weight:600;font-size:14px}
.picker-id{color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:10px;margin-top:1px}

/* SKELETON */
.skel-block{display:none;margin-bottom:12px}
.skel-block.active{display:block}
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r2)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-profile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;margin-bottom:10px}
.sk-av{width:52px;height:52px;flex-shrink:0;border-radius:var(--r2)}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px}
.sk-line{height:11px}
.sk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sk-stat{height:64px;border-radius:var(--r)}

/* ERROR */
.err{display:none;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);border-left:3px solid var(--red);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red2);gap:8px;align-items:center;font-family:'Share Tech Mono',monospace}
.err.active{display:flex}

/* PROFILE CARD */
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.profile-banner{height:40px;background:linear-gradient(135deg,rgba(0,210,211,.12),rgba(108,92,231,.12));position:relative;overflow:hidden}
.profile-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 14px,rgba(255,255,255,.015) 14px,rgba(255,255,255,.015) 28px)}
.profile-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),var(--purple),transparent 60%)}
.profile-body{padding:0 14px 12px;display:flex;gap:10px;align-items:flex-end;margin-top:-22px}
.profile-av{width:48px;height:48px;border-radius:8px;border:2px solid var(--bg);object-fit:cover;background:var(--bg3);flex-shrink:0;z-index:1;position:relative}
.profile-center{flex:1;min-width:0;padding-top:24px}
.profile-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
.profile-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:3px}
.profile-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.source-badge{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--cyan);border:1px solid rgba(0,210,211,.25);border-radius:3px;padding:2px 5px}
.profile-right{flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding-top:24px;min-width:70px}
.rank-pill{background:rgba(0,210,211,.06);border:1px solid var(--border2);border-radius:var(--r2);padding:5px 8px;text-align:center}
.rank-em{font-size:18px;line-height:1}
.rank-name{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--text);margin-top:1px;white-space:nowrap}
.mmr-pill{background:rgba(255,211,42,.08);border:1px solid rgba(255,211,42,.25);border-radius:var(--r2);padding:4px 8px;text-align:center}
.mmr-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);line-height:1}
.mmr-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:1px}

/* SEC TITLE */
.sec{font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sec-icon{color:var(--cyan)}

/* WINRATE */
.wr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;position:relative;overflow:hidden}
.wr-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--cyan),var(--purple))}
.wr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.wr-num{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;line-height:.9;letter-spacing:-2px}
.wr-num.good{color:var(--green)}.wr-num.ok{color:var(--gold)}.wr-num.bad{color:var(--red)}
.wr-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:5px}
.wr-wl{text-align:right}
.wr-wl-row{font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:2px}
.wr-wl-row .w{color:var(--green)}.wr-wl-row .l{color:var(--red)}
.wr-total{font-size:10px;color:var(--text3);margin-top:3px;font-family:'Share Tech Mono',monospace}
.wr-recent{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:8px}
.wr-dot{width:17px;height:17px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;font-family:'Rajdhani',sans-serif}
.wr-dot.w{background:rgba(46,213,115,.12);color:var(--green);border:1px solid rgba(46,213,115,.25)}
.wr-dot.l{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.wr-bar-bg{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.wr-bar-fill{height:100%;border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.wr-bar-fill.good{background:linear-gradient(90deg,var(--green),var(--green2))}
.wr-bar-fill.ok{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.wr-bar-fill.bad{background:linear-gradient(90deg,var(--red),var(--red2))}

/* STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:6px 12px;font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;margin-bottom:10px}
.streak-badge.win{background:rgba(46,213,115,.08);border:1px solid rgba(46,213,115,.25);color:var(--green)}
.streak-badge.loss{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);color:var(--red)}

/* TREND */
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.trend-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.trend-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:5px}
.trend-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.trend-key{font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace}
.trend-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.trend-val.green{color:var(--green)}.trend-val.gold{color:var(--gold)}.trend-val.red{color:var(--red)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;transition:border-color .2s}
.stat-c:hover{border-color:var(--border2)}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;line-height:1;color:var(--white)}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.gold{color:var(--gold)}
.stat-val.blue{color:var(--blue)}.stat-val.purple{color:var(--purple)}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

/* CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.chart-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.chart-legend{display:flex;gap:10px}
.leg-i{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace}
.leg-d{width:8px;height:3px;border-radius:2px}
.chart-wrap{position:relative;height:130px}

/* HEROES */
.hero-list{display:flex;flex-direction:column;gap:6px}
.hero-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;gap:8px;transition:border-color .2s}
.hero-row:hover{border-color:var(--border2)}
.hero-img{width:56px;height:32px;border-radius:4px;object-fit:cover;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.hero-rank{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);width:14px;text-align:center;flex-shrink:0}
.hero-name{flex:1;font-weight:600;font-size:13px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hero-games{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.hero-kda-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2)}
.hero-bar{width:36px;height:3px;background:var(--bg);border-radius:2px;overflow:hidden;flex-shrink:0}
.hero-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.hero-wr{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;min-width:38px;text-align:right}
.hero-wr.good{color:var(--green)}.hero-wr.ok{color:var(--gold)}.hero-wr.bad{color:var(--red)}

/* MATCHES */
.match-list{display:flex;flex-direction:column;gap:5px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.match-card:hover{border-color:var(--border2)}
.match-main{padding:9px 12px;display:grid;grid-template-columns:46px 1fr auto auto;align-items:center;gap:8px;position:relative}
.match-main::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.match-card.win .match-main::before{background:var(--green)}
.match-card.loss .match-main::before{background:var(--red)}
.match-himg{width:46px;height:26px;border-radius:4px;object-fit:cover;background:var(--bg3);border:1px solid var(--border);display:block}
.match-kda-str{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2)}
.match-hero-name{font-size:10px;color:var(--text3);margin-top:2px;font-family:'Share Tech Mono',monospace}
.match-dur{font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace;margin-top:1px}
.match-kda-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;text-align:center}
.match-kda-val.good{color:var(--green)}.match-kda-val.ok{color:var(--gold)}.match-kda-val.bad{color:var(--red)}
.match-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.match-pill{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px}
.match-pill.win{background:rgba(46,213,115,.1);color:var(--green);border:1px solid rgba(46,213,115,.25)}
.match-pill.loss{background:rgba(255,71,87,.08);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.match-chevron{font-size:10px;color:var(--text3);transition:transform .25s}
.match-card.expanded .match-chevron{transform:rotate(180deg)}
.match-expand{display:none;border-top:1px solid var(--border);padding:10px 12px;background:var(--bg3)}
.match-expand.open{display:block}
.match-expand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.mex-cell{text-align:center}
.mex-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.mex-val.green{color:var(--green)}.mex-val.gold{color:var(--gold)}.mex-val.red{color:var(--red)}
.mex-val.blue{color:var(--blue)}.mex-val.purple{color:var(--purple)}
.mex-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.match-links{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.match-open-link{display:block;text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:1px;padding:6px;border:1px solid rgba(0,210,211,.15);border-radius:5px;text-decoration:none;transition:background .2s}
.match-open-link:hover{background:rgba(0,210,211,.07)}

/* INNER TABS (overview/matches/heroes/ai inside player screen) */
.inner-tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:10px}
.inner-tab{flex:1;padding:7px 2px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);border-radius:6px;cursor:pointer;transition:all .2s;border:none;background:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inner-tab.active{background:rgba(0,210,211,.1);color:var(--cyan);border:1px solid rgba(0,210,211,.25)}
.inner-tab.ai-tab.active{color:var(--ai2);border-color:rgba(108,92,231,.35);background:rgba(108,92,231,.1)}
.inner-panel{display:none}
.inner-panel.active{display:block}

/* MISSIONS */
.mission-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;transition:border-color .2s}
.mission-card.done{border-color:rgba(46,213,115,.3);background:rgba(46,213,115,.04)}
.mission-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mission-icon{font-size:20px;flex-shrink:0}
.mission-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.mission-desc{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Share Tech Mono',monospace}
.mission-reward{margin-left:auto;text-align:right;flex-shrink:0}
.mission-reward-coins{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold)}
.mission-reward-xp{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-top:1px}
.mission-bar-bg{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:4px}
.mission-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.mission-progress{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);display:flex;justify-content:space-between}
.claim-btn{width:100%;margin-top:8px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:var(--r2);padding:9px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:opacity .2s}
.claim-btn:hover{opacity:.88}
.type-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:3px 7px;border:1px solid var(--border);border-radius:3px;margin-bottom:8px;display:inline-block}

/* SHOP */
.shop-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.shop-item-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.shop-item-price{margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold);white-space:nowrap}
.buy-btn{width:100%;background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:var(--r2);padding:9px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:opacity .2s}
.buy-btn:hover{opacity:.88}
.buy-btn:disabled{opacity:.35;cursor:not-allowed;background:var(--bg3);color:var(--text3)}

/* USER PROFILE MINI */
.user-mini{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.user-mini-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.user-mini-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px}

/* XP BAR */
.xp-bar-wrap{margin-bottom:12px}

/* AI */
.ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ai-action-btn{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:10px;cursor:pointer;text-align:left;transition:border-color .2s;display:flex;align-items:flex-start;gap:8px}
.ai-action-btn:hover{border-color:rgba(108,92,231,.4)}
.ai-action-btn:active{transform:scale(.97)}
.ai-action-icon{font-size:18px;flex-shrink:0;line-height:1}
.ai-action-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--white)}
.ai-action-desc{font-size:10px;color:var(--text3);margin-top:2px;font-family:'Share Tech Mono',monospace}
.ai-chat-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.ai-chat-messages{min-height:100px;max-height:360px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ai-msg{display:flex;gap:8px;align-items:flex-start}
.ai-msg.user{flex-direction:row-reverse}
.ai-msg-bubble{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;max-width:85%}
.ai-msg.assistant .ai-msg-bubble{background:rgba(108,92,231,.12);border:1px solid rgba(108,92,231,.25);color:var(--text);border-radius:8px 8px 8px 2px}
.ai-msg.user .ai-msg-bubble{background:rgba(0,210,211,.1);border:1px solid rgba(0,210,211,.25);color:var(--white);border-radius:8px 8px 2px 8px}
.ai-msg-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.ai-msg.assistant .ai-msg-avatar{background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3)}
.ai-msg.user .ai-msg-avatar{background:rgba(0,210,211,.12);border:1px solid rgba(0,210,211,.25)}
.ai-typing{display:none;align-items:center;gap:4px;padding:8px 12px}
.ai-typing.active{display:flex}
.ai-typing span{width:6px;height:6px;background:var(--ai);border-radius:50%;animation:typing .9s ease-in-out infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
.ai-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--bg3)}
.ai-input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 12px;color:var(--white);font-size:13px;font-family:'Exo 2',sans-serif;outline:none;transition:border-color .2s}
.ai-input:focus{border-color:var(--ai)}
.ai-input::placeholder{color:var(--text3)}
.ai-send-btn{background:linear-gradient(135deg,var(--ai),var(--ai2));border:none;border-radius:var(--r2);padding:9px 14px;color:#fff;font-size:15px;cursor:pointer;transition:opacity .2s;flex-shrink:0}
.ai-send-btn:hover{opacity:.88}
.ai-send-btn:disabled{opacity:.35;cursor:not-allowed}

/* EMPTY STATE */
.empty-state{text-align:center;padding:32px 20px;color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.8}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SCREEN HEADERS */

}

<body>

<script>
const API = "https://dota2-analyzer-production.up.railway.app";

let tg = null;
try{ tg = window.Telegram?.WebApp; if(tg){ tg.ready(); tg.expand(); } }catch(e){}

let currentPlayerData = null;
let currentUser = null; // loaded from API if tg available
let userCoins = 0;
let aiHistory = [];

// ── SCREEN NAVIGATION ────────────────────────
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');

  if(name==='missions') refreshMissions();
  if(name==='shop') refreshShop();
}

// ── HERO MAPS ────────────────────────────────
const HERO_SHORT={1:"antimage",2:"axe",3:"bane",4:"bloodseeker",5:"crystal_maiden",6:"drow_ranger",7:"earthshaker",8:"juggernaut",9:"mirana",10:"morphling",11:"nevermore",12:"phantom_lancer",13:"puck",14:"pudge",15:"razor",16:"sand_king",17:"storm_spirit",18:"sven",19:"tiny",20:"vengefulspirit",21:"windrunner",22:"zuus",23:"kunkka",25:"lina",26:"lion",27:"shadow_shaman",28:"slardar",29:"tidehunter",30:"witch_doctor",31:"lich",32:"riki",33:"enigma",34:"tinker",35:"sniper",36:"necrolyte",37:"warlock",38:"beastmaster",39:"queenofpain",40:"venomancer",41:"faceless_void",42:"skeleton_king",43:"death_prophet",44:"phantom_assassin",45:"pugna",46:"templar_assassin",47:"viper",48:"luna",49:"dragon_knight",50:"dazzle",51:"rattletrap",52:"leshrac",53:"furion",54:"life_stealer",55:"dark_seer",56:"clinkz",57:"omniknight",58:"enchantress",59:"huskar",60:"night_stalker",61:"broodmother",62:"bounty_hunter",63:"weaver",64:"jakiro",65:"batrider",66:"chen",67:"spectre",68:"ancient_apparition",69:"doom_bringer",70:"ursa",71:"spirit_breaker",72:"gyrocopter",73:"alchemist",74:"invoker",75:"silencer",76:"obsidian_destroyer",77:"lycan",78:"brewmaster",79:"shadow_demon",80:"lone_druid",81:"chaos_knight",82:"meepo",83:"treant",84:"ogre_magi",85:"undying",86:"rubick",87:"disruptor",88:"nyx_assassin",89:"naga_siren",90:"keeper_of_the_light",91:"wisp",92:"visage",93:"slark",94:"medusa",95:"troll_warlord",96:"centaur",97:"magnataur",98:"shredder",99:"bristleback",100:"tusk",101:"skywrath_mage",102:"abaddon",103:"elder_titan",104:"legion_commander",106:"ember_spirit",107:"earth_spirit",109:"terrorblade",110:"phoenix",111:"oracle",112:"winter_wyvern",113:"arc_warden",120:"pangolier",121:"dark_willow",123:"grimstroke",126:"void_spirit",128:"snapfire",129:"mars",135:"dawnbreaker",136:"marci",137:"primal_beast",138:"muerta"};
const HERO_NAMES={1:"Anti-Mage",2:"Axe",3:"Bane",4:"Bloodseeker",5:"Crystal Maiden",6:"Drow Ranger",7:"Earthshaker",8:"Juggernaut",9:"Mirana",10:"Morphling",11:"Shadow Fiend",12:"Phantom Lancer",13:"Puck",14:"Pudge",15:"Razor",16:"Sand King",17:"Storm Spirit",18:"Sven",19:"Tiny",20:"Vengeful Spirit",21:"Windranger",22:"Zeus",23:"Kunkka",25:"Lina",26:"Lion",27:"Shadow Shaman",28:"Slardar",29:"Tidehunter",30:"Witch Doctor",31:"Lich",32:"Riki",33:"Enigma",34:"Tinker",35:"Sniper",36:"Necrophos",37:"Warlock",38:"Beastmaster",39:"Queen of Pain",40:"Venomancer",41:"Faceless Void",42:"Wraith King",43:"Death Prophet",44:"Phantom Assassin",45:"Pugna",46:"Templar Assassin",47:"Viper",48:"Luna",49:"Dragon Knight",50:"Dazzle",51:"Clockwerk",52:"Leshrac",53:"Nature's Prophet",54:"Lifestealer",55:"Dark Seer",56:"Clinkz",57:"Omniknight",58:"Enchantress",59:"Huskar",60:"Night Stalker",61:"Broodmother",62:"Bounty Hunter",63:"Weaver",64:"Jakiro",65:"Batrider",66:"Chen",67:"Spectre",68:"Ancient Apparition",69:"Doom",70:"Ursa",71:"Spirit Breaker",72:"Gyrocopter",73:"Alchemist",74:"Invoker",75:"Silencer",76:"Outworld Destroyer",77:"Lycan",78:"Brewmaster",79:"Shadow Demon",80:"Lone Druid",81:"Chaos Knight",82:"Meepo",83:"Treant Protector",84:"Ogre Magi",85:"Undying",86:"Rubick",87:"Disruptor",88:"Nyx Assassin",89:"Naga Siren",90:"Keeper of the Light",91:"Io",92:"Visage",93:"Slark",94:"Medusa",95:"Troll Warlord",96:"Centaur Warrunner",97:"Magnus",98:"Timbersaw",99:"Bristleback",100:"Tusk",101:"Skywrath Mage",102:"Abaddon",103:"Elder Titan",104:"Legion Commander",106:"Ember Spirit",107:"Earth Spirit",109:"Terrorblade",110:"Phoenix",111:"Oracle",112:"Winter Wyvern",113:"Arc Warden",120:"Pangolier",121:"Dark Willow",123:"Grimstroke",126:"Void Spirit",128:"Snapfire",129:"Mars",135:"Dawnbreaker",136:"Marci",137:"Primal Beast",138:"Muerta"};
const RANK_MAP={1:{em:"🪵",name:"Herald"},2:{em:"🛡️",name:"Guardian"},3:{em:"⚒️",name:"Crusader"},4:{em:"🗡️",name:"Archon"},5:{em:"⚔️",name:"Legend"},6:{em:"🏅",name:"Ancient"},7:{em:"💎",name:"Divine"},8:{em:"🌟",name:"Immortal"}};

function getRank(t,s){if(t){const r=String(t),tier=parseInt(r[0])||0,stars=r.length>1?parseInt(r[1])||0:0,rk=RANK_MAP[tier]||{em:"❓",name:"Unknown"};return{em:rk.em,name:rk.name,stars};}if(!s||s==='Uncalibrated')return{em:"❓",name:"Uncalibrated",stars:0};const n=s.toLowerCase();let tier=0;if(n.includes('herald'))tier=1;else if(n.includes('guardian'))tier=2;else if(n.includes('crusader'))tier=3;else if(n.includes('archon'))tier=4;else if(n.includes('legend'))tier=5;else if(n.includes('ancient'))tier=6;else if(n.includes('divine'))tier=7;else if(n.includes('immortal'))tier=8;const stars=(s.match(/★/g)||[]).length,rk=RANK_MAP[tier]||{em:"❓",name:"Unknown"};return{em:rk.em,name:rk.name,stars};}
function starsHtml(n){return n?`<span style="font-size:9px;color:var(--gold)"> ${'★'.repeat(Math.min(n,5))}</span>`:'';}
function getHeroImg(hid,hs){const s=hs||HERO_SHORT[hid];return s?`https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${s}.png`:hid?`https://api.opendota.com/apps/dota2/images/heroes/${hid}_sb.png`:'';}
function getHeroFb(hid){return hid?`https://api.opendota.com/apps/dota2/images/heroes/${hid}_sb.png`:'';}
function getHeroName(hid,ns){if(ns&&ns!=='Unknown'&&!ns.startsWith('Hero #'))return ns;return HERO_NAMES[hid]||(hid?`Hero #${hid}`:'Unknown');}
const wrc=w=>w>=55?'good':w>=50?'ok':'bad';
const kdaC=k=>k>=4?'good':k>=2?'ok':'bad';
const escH=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fnum=n=>(n!=null&&n!==0)?Number(n).toLocaleString('en'):'—';

// ── SEARCH ───────────────────────────────────
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
let sugTimer=null;
document.getElementById('si').addEventListener('input',e=>{
  const v=e.target.value.trim();
  clearTimeout(sugTimer);
  if(v.length<2||/^\d+$/.test(v)){closeSug();return;}
  sugTimer=setTimeout(()=>fetchSug(v),350);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))closeSug();});

async function fetchSug(q){
  try{const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);renderSug(await r.json());}
  catch{closeSug();}
}
function renderSug(list){
  const el=document.getElementById('sugList');
  if(!list||!list.length){closeSug();return;}
  el.innerHTML=list.map(p=>`
    <div class="suggest-item" onclick="pickSug('${p.account_id}')">
      <img class="sug-av" src="${escH(p.avatarfull||'')}" onerror="this.style.visibility='hidden'" alt="">
      <div><div class="sug-name">${escH(p.personaname||'Unknown')}</div><div class="sug-id">#${p.account_id}</div></div>
    </div>`).join('');
  if(list.length>1)el.innerHTML+=`<div class="sug-hint">${list.length} игроков найдено</div>`;
  el.classList.add('open');
}
function pickSug(id){document.getElementById('si').value=id;closeSug();doSearch();}
function closeSug(){document.getElementById('sugList').classList.remove('open');}

async function doSearch(){
  const q=document.getElementById('si').value.trim();
  if(!q)return;
  closeSug();clearPicker();setLoad(true);hideErr();hideRes();
  try{
    if(/^\d+$/.test(q)){await loadPlayer(q);return;}
    const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const list=await r.json();
    if(!list||list.length===0){showErr(`Игрок "${q}" не найден. Попробуй Steam ID.`);return;}
    if(list.length===1){await loadPlayer(String(list[0].account_id));}
    else{setLoad(false);showPicker(list,q);}
  }catch(e){showErr(e.message||'Ошибка поиска.');}
  finally{setLoad(false);}
}

function showPicker(list,query){
  document.getElementById('pickerBlock').innerHTML=`
    <div class="picker fu">
      <div class="picker-header">НАЙДЕНО ${list.length} ИГРОКОВ — ВЫБЕРИ НУЖНОГО</div>
      ${list.map(p=>`
        <div class="picker-item" onclick="pickPlayer('${p.account_id}')">
          <img class="picker-av" src="${escH(p.avatarfull||'')}" onerror="this.style.opacity='.3'" alt="">
          <div><div class="picker-name">${escH(p.personaname||'Unknown')}</div><div class="picker-id">ID: ${p.account_id}</div></div>
        </div>`).join('')}
    </div>`;
}
async function pickPlayer(id){clearPicker();document.getElementById('si').value=id;await loadPlayer(id);}
function clearPicker(){document.getElementById('pickerBlock').innerHTML='';}

async function loadPlayer(query){
  setLoad(true);hideErr();hideRes();
  try{
    const r=await fetch(`${API}/player?query=${encodeURIComponent(query)}`);
    if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.detail||`Error ${r.status}`);}
    const data=await r.json();
    currentPlayerData=data;
    renderAll(data);
    // Обновляем миссии после загрузки игрока
    if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){
      const tid=tg.initDataUnsafe.user.id;
      fetch(`${API}/missions/update`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tid,player_data:data})}).catch(()=>{});
      loadUserData(tid);
    }
  }catch(e){showErr(e.message||'Не удалось загрузить данные.');}
  finally{setLoad(false);}
}

function setLoad(on){
  document.getElementById('skelBlock').classList.toggle('active',on);
  const b=document.getElementById('sb');b.disabled=on;b.textContent=on?'...':'НАЙТИ';
}
function showErr(m){document.getElementById('errText').textContent=m;document.getElementById('errBlock').classList.add('active');}
function hideErr(){document.getElementById('errBlock').classList.remove('active');}

          <div class="mex-cell"><div class="mex-val blue">${m.last_hits??'—'}</div><div class="mex-lbl">Last Hits</div></div>

function toggleMatch(i){
  const card=document.getElementById(`mc${i}`),exp=document.getElementById(`me${i}`);
  if(!card||!exp)return;
  const open=exp.classList.contains('open');
  exp.classList.toggle('open',!open);
  card.classList.toggle('expanded',!open);
}

// ── HEROES ───────────────────────────────────
function renderHeroes(list){
  const el=document.getElementById('heroList');
  if(!list||!list.length){el.innerHTML='<div class="empty-state">NO DATA</div>';return;}
  el.innerHTML=list.slice(0,10).map((h,i)=>{
    const hid=h.hero_id,img=getHeroImg(hid,h.hero_short),fb=getHeroFb(hid);
    const name=getHeroName(hid,h.hero_name);
    const wr=h.winrate??(h.wins&&h.matches?Math.round(h.wins/h.matches*100):0);
    const wc=wrc(wr),clr=wc==='good'?'var(--green)':wc==='ok'?'var(--gold)':'var(--red)';
    return `
    <div class="hero-row">
      <div class="hero-rank">${i+1}</div>
      <img class="hero-img" src="${escH(img)}" onerror="this.src='${escH(fb)}';this.onerror=null" alt="${escH(name)}"/>
      <div class="hero-name">${escH(name)}</div>
      <div class="hero-stats">
        <div class="hero-games">${h.matches||0} games</div>
        <div class="hero-kda-lbl">KDA ${h.kda??'—'}${h.avg_gpm?` · ${h.avg_gpm}GPM`:''}</div>
      </div>
      <div class="hero-bar"><div class="hero-bar-fill" style="width:${wr}%;background:${clr}"></div></div>
      <div class="hero-wr ${wc}">${wr}%</div>
    </div>`;
  }).join('');
}

// ── CHART ────────────────────────────────────
function drawChart(matches){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('kdaChart')?.getContext('2d');
  if(!ctx)return;
  const rev=[...matches.slice(0,15)].reverse();
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:rev.map((_,i)=>`#${i+1}`),
      datasets:[{data:rev.map(m=>m.kda||0),backgroundColor:rev.map(m=>m.win?'rgba(46,213,115,.6)':'rgba(255,71,87,.6)'),borderColor:rev.map(m=>m.win?'#2ed573':'#ff4757'),borderWidth:1,borderRadius:3,borderSkipped:false}]
    },
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:'easeOutQuart'},plugins:{legend:{display:false},tooltip:{backgroundColor:'#151b26',borderColor:'#1e2838',borderWidth:1,titleColor:'#636e72',bodyColor:'#dfe6e9',padding:8,callbacks:{title:c=>`Match ${c[0].label}`,label:c=>` KDA: ${c.raw}`}}},scales:{x:{grid:{color:'rgba(30,40,56,.8)'},ticks:{color:'#636e72',font:{family:'Share Tech Mono',size:8}}},y:{grid:{color:'rgba(30,40,56,.8)'},ticks:{color:'#636e72',font:{family:'Share Tech Mono',size:8}},beginAtZero:true}}}
  });
}

// Локальный прогресс (если нет Telegram)
let localMissions = null;
let localCoins = parseInt(localStorage.getItem('localCoins')||'0');
let localXp = parseInt(localStorage.getItem('localXp')||'0');
let localLevel = parseInt(localStorage.getItem('localLevel')||'1');

function getTelegramId(){
  return tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
}

async function loadUserData(telegramId){
  if(!telegramId) return;
  try{
    const r=await fetch(`${API}/user/profile?telegram_id=${telegramId}`);
    const data=await r.json();
    currentUser=data.user;
    userCoins=data.user.coins||0;
    localLevel=data.user.level||1;
    localXp=data.user.xp||0;
    updateCoinDisplays();
  }catch(e){console.error('loadUserData:',e);}
}

function updateCoinDisplays(){
  const coins = currentUser ? currentUser.coins : localCoins;
  const el1=document.getElementById('missionCoins');
  const el2=document.getElementById('shopCoins');
  if(el1) el1.textContent = `💰 ${coins}`;
  if(el2) el2.textContent = `💰 ${coins}`;
}

// ── MISSIONS ─────────────────────────────────
async function refreshMissions(){
  const el = document.getElementById('missionsList');
  const tid = getTelegramId();

  if(!tid){
    // Показываем миссии на основе данных игрока (без авторизации)
    if(!currentPlayerData){
      el.innerHTML=`<div class="empty-state"><span class="es-icon">🔍</span>Сначала найди игрока на вкладке Поиск</div>`;
      return;
    }
    renderLocalMissions(currentPlayerData);
    return;
  }

  el.innerHTML=`<div class="empty-state"><span class="es-icon" style="font-size:20px">⏳</span>Загрузка...</div>`;
  try{
    const r=await fetch(`${API}/missions?telegram_id=${tid}`);
    const data=await r.json();
    renderMissions(data.missions||[]);
    updateCoinDisplays();
  }catch(e){
    // Fallback — показываем локальные миссии
    if(currentPlayerData) renderLocalMissions(currentPlayerData);
    else el.innerHTML=`<div class="empty-state"><span class="es-icon">⚠️</span>Не удалось загрузить миссии</div>`;
  }
}

function renderLocalMissions(data){
  // Генерируем миссии на основе статистики игрока (без сервера)
  const s=data.stats, t=data.trend||{}, rm=data.recent_matches||[];
  const wins5 = rm.slice(0,5).filter(m=>m.win).length;
  const avgKda = t.last5_avg_kda||0;

  const missions = [
    {icon:'🏆',title:'Серия побед',desc:'Выиграй 3 матча подряд',progress:Math.min(data.trend?.streak?.type==='win'?data.trend.streak.count:0,3),target:3,coins:50,xp:100,type:'daily',done:data.trend?.streak?.type==='win'&&data.trend.streak.count>=3},
    {icon:'⚔️',title:'Высокий KDA',desc:'Набери KDA 4+ в матче',progress:rm.filter(m=>m.kda>=4).length,target:1,coins:30,xp:60,type:'daily',done:rm.some(m=>m.kda>=4)},
    {icon:'💰',title:'Фарм-мастер',desc:'Среднее GPM 600+ за 5 игр',progress:Math.round(t.last5_avg_gpm||0),target:600,coins:80,xp:150,type:'weekly',done:(t.last5_avg_gpm||0)>=600},
    {icon:'🎯',title:'Стабильность',desc:'WR выше 50% за последние 20',progress:Math.round(s.winrate),target:50,coins:100,xp:200,type:'weekly',done:s.winrate>=50},
    {icon:'🌟',title:'Мастер игры',desc:'Выиграй 50 матчей',progress:Math.min(s.wins,50),target:50,coins:200,xp:500,type:'monthly',done:s.wins>=50},
  ];

  renderMissions(missions);
}

function renderMissions(missions){
  const el=document.getElementById('missionsList');
  if(!missions||missions.length===0){
    el.innerHTML=`<div class="empty-state"><span class="es-icon">📭</span>Нет активных миссий</div>`;
    return;
  }

  const groups={daily:[],weekly:[],monthly:[]};
  missions.forEach(m=>groups[m.type]?.push(m));
  const typeNames={daily:'Ежедневные',weekly:'Недельные',monthly:'Месячные'};

  let html='';
  ['daily','weekly','monthly'].forEach(type=>{
    if(!groups[type].length)return;
    html+=`<div class="type-label">${typeNames[type]}</div>`;
    groups[type].forEach(m=>{
      const pct=Math.min(Math.round((m.progress/m.target_value||m.target)*100),100);
      const done=m.completed||m.done||pct>=100;
      const canClaim=done&&!m.claimed;
      html+=`
      <div class="mission-card ${done?'done':''}">
        <div class="mission-top">
          <div class="mission-icon">${m.icon||'🎯'}</div>
          <div style="flex:1;min-width:0">
            <div class="mission-title">${escH(m.title)}</div>
            <div class="mission-desc">${escH(m.description||m.desc||'')}</div>
          </div>
          <div class="mission-reward">
            <div class="mission-reward-coins">+${m.reward_coins||m.coins||0}</div>
            <div class="mission-reward-xp">+${m.reward_xp||m.xp||0} XP</div>
          </div>
        </div>
        <div class="mission-bar-bg">
          <div class="mission-bar-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--cyan)'}"></div>
        </div>
        <div class="mission-progress">
          <span>${m.progress||0} / ${m.target_value||m.target||1}</span>
          <span>${pct}%</span>
        </div>
        ${canClaim?`<button class="claim-btn" onclick="claimMission(${m.id||0})">ПОЛУЧИТЬ НАГРАДУ</button>`:''}
      </div>`;
    });
  });
  el.innerHTML=html;
}

async function claimMission(missionId){
  const tid=getTelegramId();
  if(!tid){alert('Авторизуйся через Telegram для получения наград');return;}
  try{
    const r=await fetch(`${API}/missions/claim`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tid,mission_id:missionId})});
    const data=await r.json();
    if(data.status==='ok'){
      alert(`Награда получена!\n+${data.reward?.coins||0} монет\n+${data.reward?.xp||0} XP`);
      loadUserData(tid);
      refreshMissions();
    }
  }catch(e){alert('Ошибка: '+e.message);}
}

// ── SHOP ─────────────────────────────────────
async function refreshShop(){
  const el=document.getElementById('shopItems');
  const tid=getTelegramId();

  el.innerHTML=`<div class="empty-state"><span class="es-icon" style="font-size:20px">⏳</span>Загрузка...</div>`;

  try{
    const r=await fetch(`${API}/shop`);
    const data=await r.json();
    if(tid) await loadUserData(tid);
    renderShop(data.items||[]);
  }catch(e){
    el.innerHTML=`<div class="empty-state"><span class="es-icon">⚠️</span>Не удалось загрузить магазин</div>`;
  }
}

function renderShop(items){
  const el=document.getElementById('shopItems');
  if(!items||items.length===0){el.innerHTML=`<div class="empty-state"><span class="es-icon">📦</span>Магазин пуст</div>`;return;}

  const coins=currentUser?currentUser.coins:localCoins;
  const typeLabels={booster_xp:'XP Бустеры',booster_coins:'Монетные бустеры',booster_mega:'Мега бустеры',cosmetic_frame:'Рамки',cosmetic_title:'Титулы'};
  const grouped={};
  items.forEach(item=>{
    if(!grouped[item.type])grouped[item.type]=[];
    grouped[item.type].push(item);
  });

  let html='';
  Object.keys(grouped).forEach(type=>{
    const label=typeLabels[type]||'Предметы';
    html+=`<div class="type-label">${label}</div>`;
    grouped[type].forEach(item=>{
      const canAfford=coins>=item.price;
      html+=`
      <div class="shop-item">
        <div class="shop-item-top">
          <div class="shop-item-icon">${item.icon||'📦'}</div>
          <div style="flex:1;min-width:0">
            <div class="shop-item-name">${escH(item.name)}</div>
            <div class="shop-item-desc">${escH(item.description||'')}</div>
          </div>
          <div class="shop-item-price">💰 ${item.price}</div>
        </div>
        <button class="buy-btn" onclick="buyItem(${item.id},'${escH(item.name)}',${item.price})" ${!canAfford?'disabled':''}>
          ${canAfford?'КУПИТЬ':'НЕ ХВАТАЕТ МОНЕТ'}
        </button>
      </div>`;
    });
  });
  el.innerHTML=html;
}

async function buyItem(itemId,itemName,price){
  const tid=getTelegramId();
  if(!tid){alert('Авторизуйся через Telegram для покупок');return;}
  if(!confirm(`Купить ${itemName} за ${price} монет?`))return;
  try{
    const r=await fetch(`${API}/shop/buy`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tid,item_id:itemId})});
    const data=await r.json();
    if(data.status==='ok'){
      alert(`Куплено ${data.item}!\nОсталось монет: ${data.coins_left}`);
      loadUserData(tid);
      refreshShop();
    }
  }catch(e){alert('Ошибка: '+e.message);}
}

// ── AI ────────────────────────────────────────
function buildPlayerContext(){
  if(!currentPlayerData)return"No player data.";
  const d=currentPlayerData,p=d.profile,s=d.stats,t=d.trend||{};
  const heroes=(d.top_heroes||[]).slice(0,5).map(h=>`${h.hero_name||h.hero_id}(${h.matches}g,${h.winrate}%WR,KDA${h.kda})`).join(', ');
  const matches=(d.recent_matches||[]).slice(0,10).map(m=>`${m.win?'W':'L'} ${m.hero||'hero'} ${m.kills}/${m.deaths}/${m.assists} KDA${m.kda}`).join('\n');
  return `Player: ${p.name} | Rank: ${p.rank} | Source: ${d.source}\nWR: ${s.winrate}% (${s.wins}W/${s.losses}L)\nLast5: WR${t.last5_winrate}% KDA${t.last5_avg_kda}\nStreak: ${t.streak?.count||0} ${t.streak?.type||'none'}\nHeroes: ${heroes}\nMatches:\n${matches}`.trim();
}

async function callAI(userMessage){
  const playerCtx=buildPlayerContext();
  const msgs=aiHistory.length===0
    ?[{role:"user",content:`Player data:\n${playerCtx}\n\n---\n${userMessage}`}]
    :[...aiHistory.slice(-6),{role:"user",content:userMessage}];
  const r=await fetch(`${API}/ai`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:userMessage,player_context:playerCtx,history:aiHistory.slice(-6)})});
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.detail||`AI error ${r.status}`);}
  const data=await r.json();
  const text=data.reply||'No response';
  aiHistory.push({role:'user',content:userMessage});
  aiHistory.push({role:'assistant',content:text});
  return text;
}

function setAILoad(on){
  document.getElementById('aiTyping').classList.toggle('active',on);
  const b=document.getElementById('aiSendBtn');if(b)b.disabled=on;
}

function addAIMsg(role,text){
  const el=document.getElementById('aiMessages');if(!el)return;
  const div=document.createElement('div');div.className=`ai-msg ${role}`;
  div.innerHTML=`<div class="ai-msg-avatar">${role==='assistant'?'🤖':'👤'}</div><div class="ai-msg-bubble">${escH(text).replace(/\n/g,'<br>')}</div>`;
  el.appendChild(div);el.scrollTop=el.scrollHeight;
}

async function aiSend(){
  const input=document.getElementById('aiInput');
  const msg=input?.value.trim();if(!msg)return;
  if(!currentPlayerData){addAIMsg('assistant','⚠️ Сначала найди игрока');return;}
  input.value='';addAIMsg('user',msg);setAILoad(true);
  try{addAIMsg('assistant',await callAI(msg));}
  catch(e){addAIMsg('assistant',`❌ Ошибка: ${e.message}`);}
  finally{setAILoad(false);}
}

const AI_PROMPTS={
  analysis:"Сделай детальный разбор игры этого игрока. Что он делает хорошо и плохо?",
  forecast:"На основе трендов — будет ли этот игрок расти в MMR?",
  heroes:"Посмотри на пул героев. Каких стоит освоить следующими и почему?",
  weaknesses:"Найди конкретные слабые места. Где теряются игры?"
};

async function aiQuick(type){
  if(!currentPlayerData){alert('Сначала найди игрока!');return;}
  swInner('ai',document.querySelector('.inner-tab.ai-tab'));
  const prompt=AI_PROMPTS[type];
  addAIMsg('user',prompt);setAILoad(true);
  try{addAIMsg('assistant',await callAI(prompt));}
  catch(e){addAIMsg('assistant',`❌ Ошибка: ${e.message}`);}
  finally{setAILoad(false);}
}

window.addEventListener('DOMContentLoaded',()=>{
  const tid=getTelegramId();
  if(tid){loadUserData(tid);}
  refreshShop();
});
</script>
