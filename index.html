<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Dota 2 Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e17;--bg2:#0d1219;--bg3:#12171f;
  --card:#151b26;--card2:#1a2130;
  --border:#1e2838;--border2:#2a3548;
  --red:#ff4757;--red2:#ff6b7a;--orange:#ffa502;
  --gold:#ffd32a;--gold2:#ffe66d;
  --green:#2ed573;--green2:#7bed9f;
  --blue:#5f27cd;--cyan:#00d2d3;--purple:#a29bfe;
  --ai:#6c5ce7;--ai2:#a29bfe;
  --text:#dfe6e9;--text2:#74b9ff;--text3:#636e72;
  --white:#ffffff;
  --accent:#00d2d3;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:linear-gradient(135deg,#0a0e17 0%,#12171f 50%,#0a0e17 100%);
  color:var(--text);
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(0,210,211,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(108,92,231,.06) 0%, transparent 50%);
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(0,210,211,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,210,211,.02) 1px,transparent 1px);
  background-size:50px 50px;
}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 60px;position:relative;z-index:1}

/* WELCOME BANNER */
.welcome-banner{
  background:linear-gradient(135deg,rgba(0,210,211,.15),rgba(108,92,231,.15));
  border:2px solid var(--cyan);
  border-radius:var(--r);
  padding:20px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,210,211,.3);
  animation:slideDown .6s ease;
}
.welcome-banner::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(0,210,211,.1) 0%,transparent 70%);
  animation:rotate 20s linear infinite;
}
@keyframes rotate{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes slideUp{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-20px)}
}
.welcome-content{
  position:relative;
  z-index:1;
  text-align:center;
}
.welcome-emoji{
  font-size:48px;
  margin-bottom:12px;
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.welcome-title{
  font-family:'Rajdhani',sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--white);
  margin-bottom:8px;
  text-shadow:0 2px 12px rgba(0,210,211,.5);
}
.welcome-text{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  color:var(--text2);
  margin-bottom:16px;
  line-height:1.6;
}
.welcome-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:16px;
}
.welcome-stat{
  background:rgba(0,0,0,.3);
  border:1px solid rgba(0,210,211,.3);
  border-radius:8px;
  padding:12px 8px;
  backdrop-filter:blur(10px);
}
.welcome-stat-val{
  font-family:'Rajdhani',sans-serif;
  font-size:22px;
  font-weight:700;
  color:var(--cyan);
  line-height:1;
}
.welcome-stat-lbl{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--text3);
  margin-top:4px;
  letter-spacing:1px;
}
.welcome-close{
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.2);
  border-radius:50%;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--text);
  font-size:16px;
  transition:all .3s;
  z-index:2;
}
.welcome-close:hover{
  background:rgba(255,71,87,.3);
  border-color:var(--red);
  color:var(--white);
  transform:rotate(90deg);
}

/* HEADER */
.hdr{display:flex;align-items:center;gap:14px;padding:16px 0 18px;margin-bottom:20px;border-bottom:2px solid var(--border);position:relative}
.hdr::after{content:'';position:absolute;bottom:-2px;left:0;width:140px;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple),transparent)}
.hdr-logo{width:48px;height:48px;flex-shrink:0;border:2px solid rgba(0,210,211,.4);border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,210,211,.1),rgba(108,92,231,.1));box-shadow:0 4px 12px rgba(0,210,211,.2)}
.hdr-em{font-size:24px}
.hdr-title{flex:1}
.hdr-title h1{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--white);line-height:1;text-shadow:0 2px 8px rgba(0,210,211,.3)}
.hdr-title p{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:2px}
.hdr-live{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:2px;border:1px solid rgba(0,210,211,.3);border-radius:6px;padding:6px 10px;background:rgba(0,210,211,.08);box-shadow:0 0 12px rgba(0,210,211,.2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-box{background:var(--card);border:2px solid var(--border2);border-radius:var(--r);padding:0 16px;display:flex;align-items:center;gap:12px;transition:all .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.search-box:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,210,211,.15),0 8px 20px rgba(0,210,211,.2)}
.s-icon{color:var(--text3);font-size:16px;flex-shrink:0;transition:color .3s}
.search-box:focus-within .s-icon{color:var(--cyan)}
.search-input{flex:1;background:none;border:none;padding:14px 0;color:var(--white);font-size:16px;font-family:'Exo 2',sans-serif;font-weight:500;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-btn{background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:var(--r2);padding:10px 20px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s ease;white-space:nowrap;flex-shrink:0;box-shadow:0 4px 12px rgba(0,210,211,.3)}
.search-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,210,211,.4)}
.search-btn:active{transform:translateY(0)}
.search-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* SUGGEST */
.suggest-list{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card2);border:2px solid var(--border2);border-radius:var(--r);overflow:hidden;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,.8);display:none;backdrop-filter:blur(10px)}
.suggest-list.open{display:block;animation:slideDown .3s ease}
.suggest-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;font-size:14px;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:linear-gradient(90deg,rgba(0,210,211,.1),transparent);transform:translateX(4px)}
.sug-av{width:32px;height:32px;border-radius:6px;object-fit:cover;background:var(--bg3);flex-shrink:0;border:1px solid var(--border)}
.sug-name{color:var(--white);font-weight:600}
.sug-id{color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:10px}
.sug-hint{padding:10px 16px;font-size:11px;color:var(--text3);font-family:'Share Tech Mono',monospace;text-align:center}

/* PICKER */
.picker{background:var(--card);border:2px solid var(--border2);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeUp .4s ease}
.picker-header{padding:12px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:2px;border-bottom:2px solid var(--border);background:linear-gradient(135deg,rgba(0,210,211,.1),rgba(108,92,231,.1))}
.picker-item{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .2s;border-bottom:1px solid var(--border)}
.picker-item:last-child{border-bottom:none}
.picker-item:hover{background:linear-gradient(90deg,rgba(0,210,211,.08),transparent);transform:translateX(4px)}
.picker-av{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0;border:2px solid var(--border)}
.picker-name{color:var(--white);font-weight:600;font-size:15px}
.picker-id{color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px;margin-top:2px}

/* SKELETON */
.skel-block{display:none;margin-bottom:16px}
.skel-block.active{display:block}
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r2)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-profile{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:18px;display:flex;gap:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.sk-av{width:64px;height:64px;flex-shrink:0;border-radius:var(--r2)}
.sk-lines{flex:1;display:flex;flex-direction:column;gap:10px;padding-top:6px}
.sk-line{height:12px}
.sk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sk-stat{height:80px;border-radius:var(--r)}

/* ERROR */
.err{display:none;background:rgba(255,71,87,.1);border:2px solid rgba(255,71,87,.3);border-left:4px solid var(--red);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red2);gap:10px;align-items:center;font-family:'Share Tech Mono',monospace;box-shadow:0 4px 12px rgba(255,71,87,.2)}
.err.active{display:flex;animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.results{display:none}
.results.active{display:block}

/* PROFILE */
.profile-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;position:relative;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.profile-banner{height:60px;background:linear-gradient(135deg,rgba(0,210,211,.15),rgba(108,92,231,.15));position:relative;overflow:hidden}
.profile-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.02) 20px,rgba(255,255,255,.02) 40px)}
.profile-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple),transparent 70%);box-shadow:0 0 12px var(--cyan)}
.profile-body{padding:0 18px 18px;display:flex;flex-direction:row;gap:14px;align-items:flex-end;margin-top:-32px}
.profile-av{width:64px;height:64px;border-radius:10px;border:3px solid var(--bg);object-fit:cover;background:var(--bg3);flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.profile-center{flex:1;min-width:0;padding-top:36px}
.profile-name{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.profile-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px}
.profile-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px}
.source-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan);border:1px solid rgba(0,210,211,.3);border-radius:4px;padding:3px 6px;letter-spacing:1px;background:rgba(0,210,211,.08)}
.profile-right{flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding-top:36px;align-items:stretch;min-width:80px}
.rank-pill{background:linear-gradient(135deg,rgba(0,210,211,.1),rgba(108,92,231,.1));border:2px solid var(--border2);border-radius:var(--r2);padding:8px 10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.rank-em{font-size:22px;line-height:1}
.rank-name{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-top:3px;white-space:nowrap}
.mmr-pill{background:rgba(255,211,42,.12);border:2px solid rgba(255,211,42,.3);border-radius:var(--r2);padding:6px 10px;text-align:center;box-shadow:0 4px 12px rgba(255,211,42,.2)}
.mmr-val{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--gold);line-height:1}
.mmr-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:6px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:6px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tab{flex:1;padding:10px 4px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-radius:8px;cursor:pointer;transition:all .3s ease;border:none;background:none;position:relative}
.tab:hover{color:var(--text2)}
.tab.active{background:linear-gradient(135deg,rgba(0,210,211,.15),rgba(108,92,231,.15));color:var(--cyan);border:2px solid rgba(0,210,211,.3);box-shadow:0 4px 12px rgba(0,210,211,.2)}
.tab.ai-tab.active{color:var(--ai2);border-color:rgba(108,92,231,.4);background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(162,155,254,.15));box-shadow:0 4px 12px rgba(108,92,231,.3)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* SEC */
.sec{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--border2),transparent)}
.sec-icon{color:var(--cyan);font-size:12px}

/* WINRATE */
.wr-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.wr-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--cyan),var(--purple))}
.wr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.wr-num{font-family:'Rajdhani',sans-serif;font-size:58px;font-weight:700;line-height:.9;letter-spacing:-2px;text-shadow:0 4px 12px currentColor}
.wr-num.good{color:var(--green)}.wr-num.ok{color:var(--gold)}.wr-num.bad{color:var(--red)}
.wr-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1.5px;margin-top:6px}
.wr-wl{text-align:right}
.wr-wl-row{font-size:13px;font-family:'Share Tech Mono',monospace;margin-bottom:4px;font-weight:600}
.wr-wl-row .w{color:var(--green)}.wr-wl-row .l{color:var(--red)}
.wr-total{font-size:11px;color:var(--text3);margin-top:5px;font-family:'Share Tech Mono',monospace}
.wr-recent{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:12px}
.wr-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'Rajdhani',sans-serif;transition:transform .2s}
.wr-dot:hover{transform:scale(1.1)}
.wr-dot.w{background:rgba(46,213,115,.15);color:var(--green);border:2px solid rgba(46,213,115,.3);box-shadow:0 2px 8px rgba(46,213,115,.2)}
.wr-dot.l{background:rgba(255,71,87,.12);color:var(--red);border:2px solid rgba(255,71,87,.25);box-shadow:0 2px 8px rgba(255,71,87,.15)}
.wr-bar-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.wr-bar-fill{height:100%;border-radius:3px;transition:width 1.5s cubic-bezier(.4,0,.2,1)}
.wr-bar-fill.good{background:linear-gradient(90deg,var(--green),var(--green2));box-shadow:0 0 12px var(--green)}
.wr-bar-fill.ok{background:linear-gradient(90deg,var(--gold),var(--gold2));box-shadow:0 0 12px var(--gold)}
.wr-bar-fill.bad{background:linear-gradient(90deg,var(--red),var(--red2));box-shadow:0 0 12px var(--red)}

/* STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:8px 16px;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:2px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.streak-badge.win{background:linear-gradient(135deg,rgba(46,213,115,.15),rgba(126,237,159,.15));border:2px solid rgba(46,213,115,.3);color:var(--green);box-shadow:0 4px 16px rgba(46,213,115,.3)}
.streak-badge.loss{background:linear-gradient(135deg,rgba(255,71,87,.12),rgba(255,107,122,.12));border:2px solid rgba(255,71,87,.3);color:var(--red);box-shadow:0 4px 16px rgba(255,71,87,.3)}

/* TREND */
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.trend-c{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:all .3s ease}
.trend-c:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.4);border-color:var(--border2)}
.trend-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.trend-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.trend-key{font-size:11px;color:var(--text2);font-family:'Share Tech Mono',monospace}
.trend-val{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--white)}
.trend-val.green{color:var(--green)}.trend-val.gold{color:var(--gold)}.trend-val.red{color:var(--red)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-c{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;transition:all .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.stat-c:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.5)}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;line-height:1;color:var(--white);text-shadow:0 2px 8px currentColor}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.gold{color:var(--gold)}
.stat-val.blue{color:var(--blue)}.stat-val.purple{color:var(--purple)}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}

/* CHART */
.chart-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.chart-legend{display:flex;gap:12px}

// ── HELPERS ──────────────────────────────────
function getRank(rankTierNum, rankStr){
  if(rankTierNum){
    const s=String(rankTierNum);
    const tier=parseInt(s[0])||0, stars=s.length>1?parseInt(s[1])||0:0;
    const r=RANK_MAP[tier]||{em:"❓",name:"Unknown"};
    return {em:r.em,name:r.name,stars};
  }
  if(!rankStr||rankStr==='Uncalibrated') return {em:"❓",name:"Uncalibrated",stars:0};
  const n=rankStr.toLowerCase();
  let tier=0;
  if(n.includes('herald'))tier=1;
  else if(n.includes('guardian'))tier=2;
  else if(n.includes('crusader'))tier=3;
  else if(n.includes('archon'))tier=4;
  else if(n.includes('legend'))tier=5;
  else if(n.includes('ancient'))tier=6;
  else if(n.includes('divine'))tier=7;
  else if(n.includes('immortal'))tier=8;
  const stars=(rankStr.match(/★/g)||[]).length;
  const r=RANK_MAP[tier]||{em:"❓",name:"Unknown"};
  return {em:r.em,name:r.name,stars};
}

function getHeroFb(hid){ return hid?`https://api.opendota.com/apps/dota2/images/heroes/${hid}_sb.png`:''; }
function getHeroName(hid,ns){ if(ns&&ns!=='Unknown'&&!ns.startsWith('Hero #'))return ns; return HERO_NAMES[hid]||(hid?`Hero #${hid}`:'Unknown'); }
const wrc  = w => w>=55?'good':w>=50?'ok':'bad';
const kdaC = k => k>=4?'good':k>=2?'ok':'bad';
const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fnum = n => (n!=null&&n!==0)?Number(n).toLocaleString('en'):'—';

// ── CACHE ────────────────────────────────────
let cache = {};
const CACHE_TTL = 300;

function get_cache(key){
  if(key in cache){
    if(Date.now()/1000 - cache[key].ts < CACHE_TTL){
      return cache[key].data;
    }
    delete cache[key];
  }
  return null;
}

function set_cache(key, data){
  cache[key] = {data: data, ts: Date.now()/1000};
}

// ── EVENTS ───────────────────────────────────
document.getElementById('si').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });
let sugTimer=null;
document.getElementById('si').addEventListener('input',e=>{
  const v=e.target.value.trim();
  clearTimeout(sugTimer);
  if(v.length<2||/^\d+$/.test(v)){ closeSug(); return; }
  sugTimer=setTimeout(()=>fetchSug(v),350);
});
document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrap'))closeSug(); });

// ── SUGGEST ──────────────────────────────────
async function fetchSug(q){
  try{
    const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    renderSug(await r.json());
  }catch{ closeSug(); }
}
function renderSug(list){
  const el=document.getElementById('sugList');
  if(!list||!list.length){ closeSug(); return; }
  el.innerHTML=list.map(p=>`
    <div class="suggest-item" onclick="pickSug('${p.account_id}')">
      <img class="sug-av" src="${escH(p.avatarfull||'')}" onerror="this.style.visibility='hidden'" alt="">
      <div><div class="sug-name">${escH(p.personaname||'Unknown')}</div><div class="sug-id">#${p.account_id}</div></div>
    </div>`).join('');
  if(list.length>1) el.innerHTML+=`<div class="sug-hint">↑ ${list.length} players found</div>`;
  el.classList.add('open');
}
function pickSug(id){ document.getElementById('si').value=id; closeSug(); doSearch(); }
function closeSug(){ document.getElementById('sugList').classList.remove('open'); }

// ── SEARCH ───────────────────────────────────
async function doSearch(){
  const q=document.getElementById('si').value.trim();
  if(!q) return;
  closeSug(); clearPicker(); setLoad(true); hideErr(); hideRes();
  try{
    if(/^\d+$/.test(q)){ await loadPlayer(q); return; }
    const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const list=await r.json();
    if(!list||list.length===0){ showErr(`Player "${q}" not found. Try Steam ID.`); return; }
    if(list.length===1){ await loadPlayer(String(list[0].account_id)); }
    else{ setLoad(false); showPicker(list,q); }
  }catch(e){ showErr(e.message||'Search failed.'); }
  finally{ setLoad(false); }
}

function showPicker(list,query){
  document.getElementById('pickerBlock').innerHTML=`
    <div class="picker fu">
      <div class="picker-header">НАЙДЕНО ${list.length} ИГРОКОВ — ВЫБЕРИ НУЖНОГО</div>
      ${list.map(p=>`
        <div class="picker-item" onclick="pickPlayer('${p.account_id}')">
          <img class="picker-av" src="${escH(p.avatarfull||'')}"
            onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'36\\' height=\\'36\\'><rect width=\\'36\\' height=\\'36\\' fill=\\'%230e1520\\'/></svg>'" alt="">
          <div><div class="picker-name">${escH(p.personaname||'Unknown')}</div><div class="picker-id">Steam ID: ${p.account_id}</div></div>
        </div>`).join('')}
    </div>`;
}

async function pickPlayer(id){ clearPicker(); document.getElementById('si').value=id; await loadPlayer(id); }
function clearPicker(){ document.getElementById('pickerBlock').innerHTML=''; }

async function loadPlayer(query){
  setLoad(true); hideErr(); hideRes();
  try{
    const r=await fetch(`${API}/player?query=${encodeURIComponent(query)}`);
    if(!r.ok){ const e=await r.json().catch(()=>{}); throw new Error(e?.detail||`Error ${r.status}`); }
    const data=await r.json();
    currentPlayerData=data;
    
    // Update missions progress if user is logged in
    if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
      const telegramId = tg.initDataUnsafe.user.id;
      fetch(`${API}/missions/update`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({telegram_id: telegramId, player_data: data})
      }).catch(e => console.error('Failed to update missions:', e));
    }
    
    renderAll(data);
  }catch(e){ showErr(e.message||'Failed to load player data.'); }
  finally{ setLoad(false); }
}

function setLoad(on){
  document.getElementById('skelBlock').classList.toggle('active',on);
  const b=document.getElementById('sb'); b.disabled=on; b.textContent=on?'...':'НАЙТИ';
}
function showErr(m){ document.getElementById('errText').textContent=m; document.getElementById('errBlock').classList.add('active'); }
function hideErr(){ document.getElementById('errBlock').classList.remove('active'); }
function hideRes(){ const r=document.getElementById('results'); r.classList.remove('active'); r.innerHTML=''; currentPlayerData=null; }

function toggleMatch(i){
  const card=document.getElementById(`mc${i}`),exp=document.getElementById(`me${i}`);

  const open=exp.classList.contains('open');
  exp.classList.toggle('open',!open);
  card.classList.toggle('expanded',!open);
}

function renderHeroes(list){
  const el=document.getElementById('heroList');

    const hid=h.hero_id,img=getHeroImg(hid,h.hero_short),fb=getHeroFb(hid);

// ── CHART ────────────────────────────────────
let chartInst=null;

function drawChart(matches){
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  const ctx=document.getElementById('kdaChart')?.getContext('2d');
  if(!ctx) return;
  const rev=[...matches.slice(0,15)].reverse();
  chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:rev.map((_,i)=>`#${i+1}`),
      datasets:[{
        data:rev.map(m=>m.kda||0),
        backgroundColor:rev.map(m=>m.win?'rgba(0,229,160,.6)':'rgba(232,64,87,.6)'),
        borderColor:rev.map(m=>m.win?'#00e5a0':'#e84057'),
        borderWidth:1,borderRadius:3,borderSkipped:false,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:600,easing:'easeOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#101820',borderColor:'#182030',borderWidth:1,titleColor:'#6b8fa8',bodyColor:'#c8dce8',padding:9,
          callbacks:{title:c=>`Match ${c[0].label}`,label:c=>` KDA: ${c.raw}`}}
      },
      scales:{
        x:{grid:{color:'rgba(24,32,48,.8)'},ticks:{color:'#2d4558',font:{family:'Share Tech Mono',size:8}}},
        y:{grid:{color:'rgba(24,32,48,.8)'},ticks:{color:'#2d4558',font:{family:'Share Tech Mono',size:8}},beginAtZero:true}
      }
    }
  });
}

async function loadUserProfile(telegramId){
  try{
    const r = await fetch(`${API}/user/profile?telegram_id=${telegramId}`);
    const data = await r.json();
    currentUser = data.user;
    renderUserProfile(data);
  }catch(e){

}

async function loadMissions(telegramId){
  try{
    const r = await fetch(`${API}/missions?telegram_id=${telegramId}`);
    const data = await r.json();
    renderMissions(data.missions);
  }catch(e){
    console.error('Failed to load missions:', e);
    document.getElementById('missionsList').innerHTML = '<div style="text-align:center;padding:24px;color:var(--red)">Failed to load missions</div>';
  }
}

function renderMissions(missions){
  if(!missions || missions.length === 0){
    document.getElementById('missionsList').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-family:Share Tech Mono,monospace;font-size:11px">No active missions. Check back later!</div>';
    return;
  }
  
  const grouped = {daily:[],weekly:[],monthly:[]};
  missions.forEach(m => grouped[m.type]?.push(m));
  
  let html = '';
  
  ['daily','weekly','monthly'].forEach(type => {
    if(grouped[type].length === 0) return;
    const typeLabel = type === 'daily' ? '📅 Daily' : type === 'weekly' ? '📆 Weekly' : '📊 Monthly';
    html += `<div class="sec" style="margin-top:16px"><span class="sec-icon">${typeLabel.split(' ')[0]}</span>${typeLabel.split(' ')[1]}</div>`;
    
    grouped[type].forEach(m => {
      const progress = Math.min((m.progress / m.target_value * 100), 100).toFixed(0);
      const isComplete = m.completed;
      const canClaim = isComplete && !m.claimed;
      
      html += `
        <div class="hero-row" style="flex-direction:column;align-items:stretch;gap:8px;padding:14px;${isComplete?'border-color:var(--green);box-shadow:0 0 12px rgba(46,213,115,.2)':''}">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:24px;flex-shrink:0">${m.icon}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700;color:var(--white)">${escH(m.title)}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">${escH(m.description)}</div>
            </div>
            ${isComplete?'<div style="font-size:20px;color:var(--green)">✅</div>':''}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px">
                <span>${m.progress}/${m.target_value}</span>
                <span>${progress}%</span>
              </div>
              <div class="hero-bar" style="width:100%;height:6px">
                <div class="hero-bar-fill" style="width:${progress}%;background:${isComplete?'var(--green)':'var(--cyan)'}"></div>
              </div>
            </div>
            <div style="text-align:right;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2)">
              <div>💰 ${m.reward_coins}</div>
              <div>⭐ ${m.reward_xp}</div>
            </div>
          </div>
          ${canClaim?`<button onclick="claimMission(${m.id})" style="background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:var(--r2);padding:10px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 12px rgba(46,213,115,.3);transition:all .3s">🎁 CLAIM REWARD</button>`:''}
        </div>
      `;
    });
  });
  
  document.getElementById('missionsList').innerHTML = html;
}

async function claimMission(missionId){
  if(!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) return;
  const telegramId = tg.initDataUnsafe.user.id;
  
  try{
    const r = await fetch(`${API}/missions/claim`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({telegram_id: telegramId, mission_id: missionId})
    });
    const data = await r.json();
    
    if(data.status === 'ok'){
      alert(`🎉 Reward claimed!\n💰 +${data.reward.coins} coins\n⭐ +${data.reward.xp} XP${data.reward.new_level > currentUser.level ? '\n\n🎊 LEVEL UP! Level ' + data.reward.new_level : ''}`);
      loadUserProfile(telegramId);
      loadMissions(telegramId);
    }
  }catch(e){
    alert('Failed to claim reward: ' + e.message);
  }
}

async function loadShop(telegramId){
  try{
    const r = await fetch(`${API}/shop`);
    const data = await r.json();
    renderShop(data.items);
  }catch(e){
    console.error('Failed to load shop:', e);
    document.getElementById('shopItems').innerHTML = '<div style="text-align:center;padding:24px;color:var(--red)">Failed to load shop</div>';
  }
}

function renderShop(items){
  if(!items || items.length === 0){
    document.getElementById('shopItems').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3)">Shop is empty</div>';
    return;
  }
  
  const grouped = {};
  items.forEach(item => {
    if(!grouped[item.type]) grouped[item.type] = [];
    grouped[item.type].push(item);
  });
  
  let html = '';
  
  Object.keys(grouped).forEach(type => {
    const typeLabel = type === 'booster_xp' ? '⚡ XP Boosters' : 
                      type === 'booster_coins' ? '💰 Coin Boosters' :
                      type === 'booster_mega' ? '🚀 Mega Boosters' :
                      type === 'cosmetic_frame' ? '🖼️ Frames' :
                      type === 'cosmetic_title' ? '🏷️ Titles' :
                      type.startsWith('special') ? '🎁 Special' : '📦 Items';
    
    html += `<div class="sec" style="margin-top:16px"><span class="sec-icon">${typeLabel.split(' ')[0]}</span>${typeLabel.substring(typeLabel.indexOf(' ')+1)}</div>`;
    
    grouped[type].forEach(item => {
      const canAfford = currentUser && currentUser.coins >= item.price;
      
      html += `
        <div class="hero-row" style="flex-direction:column;align-items:stretch;gap:10px;padding:14px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:28px;flex-shrink:0">${item.icon}</div>
            <div style="flex:1">
              <div style="font-size:15px;font-weight:700;color:var(--white)">${escH(item.name)}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:3px">${escH(item.description)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:700;color:var(--gold)">💰 ${item.price}</div>
            </div>
          </div>
          <button onclick="buyItem(${item.id}, '${escH(item.name)}', ${item.price})" 
            ${!canAfford?'disabled':''} 
            style="background:${canAfford?'linear-gradient(135deg,var(--cyan),var(--purple))':'var(--bg3)'};border:none;border-radius:var(--r2);padding:10px;color:${canAfford?'#fff':'var(--text3)'};font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:${canAfford?'pointer':'not-allowed'};box-shadow:${canAfford?'0 4px 12px rgba(0,210,211,.3)':'none'};transition:all .3s;opacity:${canAfford?'1':'0.5'}">
            ${canAfford?'🛒 BUY NOW':'❌ NOT ENOUGH COINS'}
          </button>
        </div>
      `;
    });
  });
  
  document.getElementById('shopItems').innerHTML = html;
}

async function buyItem(itemId, itemName, price){
  if(!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) return;
  const telegramId = tg.initDataUnsafe.user.id;
  
  if(!confirm(`Buy ${itemName} for ${price} coins?`)) return;
  
  try{
    const r = await fetch(`${API}/shop/buy`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({telegram_id: telegramId, item_id: itemId})
    });
    const data = await r.json();
    
    if(data.status === 'ok'){
      alert(`✅ Purchased ${data.item}!\n💰 Coins left: ${data.coins_left}`);
      loadUserProfile(telegramId);
      loadShop(telegramId);
    }
  }catch(e){
    alert('Purchase failed: ' + e.message);
  }
}

// ══════════════════════════════════════════════
// AI — запросы идут через Railway /ai эндпоинт
// ══════════════════════════════════════════════
let aiHistory = [];

function buildPlayerContext(){
  if(!currentPlayerData) return "No player data.";
  const d=currentPlayerData, p=d.profile, s=d.stats, t=d.trend||{};
  const heroes=(d.top_heroes||[]).slice(0,5).map(h=>`${h.hero_name||h.hero_id}(${h.matches}g,${h.winrate}%WR,KDA${h.kda})`).join(', ');
  const matches=(d.recent_matches||[]).slice(0,10).map(m=>`${m.win?'W':'L'} ${m.hero||'hero'} ${m.kills}/${m.deaths}/${m.assists} KDA${m.kda} GPM${m.gpm}`).join('\n');
  return `Player: ${p.name} | Rank: ${p.rank} | Source: ${d.source}
WinRate: ${s.winrate}% (${s.wins}W/${s.losses}L, ${s.total_matches} total)
Last5: WR${t.last5_winrate}% KDA${t.last5_avg_kda} GPM${t.last5_avg_gpm}
Last20: WR${t.last20_winrate}% KDA${t.last20_avg_kda} GPM${t.last20_avg_gpm}
Streak: ${t.streak?.count||0} ${t.streak?.type||'none'}
Top Heroes: ${heroes}
Recent matches:\n${matches}`.trim();
}

async function callAI(userMessage){
  const playerCtx=buildPlayerContext();
  const finalMessages=aiHistory.length===0
    ? []
    : aiHistory.slice(-6);

  const r=await fetch(`${API}/ai`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message: userMessage,
      player_context: playerCtx,
      history: finalMessages
    })
  });

  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    throw new Error(e?.detail||`AI error ${r.status}`);
  }

  const data=await r.json();
  const text=data.reply||'No response';
  aiHistory.push({role:'user',content:userMessage});
  aiHistory.push({role:'assistant',content:text});
  return text;
}

function setAILoad(on){
  document.getElementById('aiTyping').classList.toggle('active',on);
  const b=document.getElementById('aiSendBtn'); if(b) b.disabled=on;
}

function addAIMsg(role,text){
  const el=document.getElementById('aiMessages');
  if(!el) return;
  const div=document.createElement('div');
  div.className=`ai-msg ${role}`;
  div.innerHTML=`
    <div class="ai-msg-avatar">${role==='assistant'?'🤖':'👤'}</div>
    <div class="ai-msg-bubble">${escH(text).replace(/\n/g,'<br>')}</div>`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

async function aiSend(){
  const input=document.getElementById('aiInput');
  const msg=input?.value.trim();
  if(!msg) return;
  if(!currentPlayerData){ addAIMsg('assistant','⚠️ Сначала найди игрока'); return; }
  input.value='';
  addAIMsg('user',msg);
  setAILoad(true);
  try{ addAIMsg('assistant',await callAI(msg)); }
  catch(e){ addAIMsg('assistant',`❌ Ошибка: ${e.message}`); }
  finally{ setAILoad(false); }
}

const AI_PROMPTS={
  analysis:"Сделай детальный разбор игры этого игрока. Что он делает хорошо и плохо? Какие ключевые проблемы?",
  forecast:"На основе трендов — будет ли этот игрок расти в MMR? Что нужно изменить?",
  heroes:  "Посмотри на пул героев и стиль игры. Каких героев стоит освоить следующими и почему?",
  weaknesses:"Найди конкретные слабые места по статистике. Где теряются игры — лейнинг, командные бои или поздняя игра?"
};

async function aiQuick(type){
  if(!currentPlayerData){ alert('Сначала найди игрока!'); return; }
  // переключаем на AI таб
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-ai').classList.add('active');
  document.querySelector('.ai-tab').classList.add('active');
  const prompt=AI_PROMPTS[type];
  addAIMsg('user',prompt);
  setAILoad(true);
  try{ addAIMsg('assistant',await callAI(prompt)); }
  catch(e){ addAIMsg('assistant',`❌ Ошибка: ${e.message}`); }
  finally{ setAILoad(false); }
}
